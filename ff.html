<!--//creat a professional login page
//creat a professional login page using html,css,and javascript-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f3c88, #2f81eb);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 36px 32px;
        }

        .login-card h1 {
            margin: 0 0 24px;
            font-size: 28px;
            letter-spacing: 0.5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        label {
            font-size: 0.95rem;
        }

        input {
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        input:focus {
            border-color: #e3ebff;
            background: rgba(255, 255, 255, 0.18);
        }

        button {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            background: #4f93ff;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #356edc;
        }

        .signup-link {
            display: block;
            margin-top: 18px;
            text-align: center;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
        }

        .signup-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Login</h1>
        <form>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <a class="signup-link" href="signup.html">Sign Up</a>
    </div>
</body>
</html>

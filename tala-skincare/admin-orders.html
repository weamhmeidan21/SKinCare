<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Rose Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== متغيرات الورد ===== */
        :root {
            --rose: #ee8587;
            --rose-dark: #c96c6f;
            --rose-light: #fff1ee;
            --brown: #4b2d29;
            --cream: #fffaf7;
            --white: #ffffff;
            --text: #322725;
            --muted: #746764;
            --border: #f3dfda;
            --shadow: 0 18px 40px rgba(153, 84, 77, 0.14);
            
            --bg-color: var(--cream);
            --card-bg: var(--white);
            --text-color: var(--text);
            --primary: var(--rose);
            --primary-dark: var(--rose-dark);
            --primary-light: var(--rose-light);
            --border-color: var(--border);
        }

        /* ===== الوضع الليلي ===== */
        body.dark-mode {
            --bg-color: #1f1418;
            --card-bg: #2d1e22;
            --text-color: #f5e2e0;
            --border-color: #5a3d3a;
            --shadow: 0 18px 40px rgba(0,0,0,0.3);
            --primary: #f09a9c;
            --primary-dark: #d68083;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
            display: flex;
            min-height: 100vh;
        }

        /* ===== السايدبار ===== */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            height: 100vh;
            position: fixed;
            padding: 30px 20px;
            box-shadow: 2px 0 12px rgba(0,0,0,0.04);
            border-right: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
            overflow-y: auto;
        }

        .sidebar .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--brown);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            letter-spacing: -0.3px;
        }

        .sidebar .logo i {
            color: var(--rose);
            font-size: 28px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin-bottom: 8px;
        }

        .sidebar ul li a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .sidebar ul li a i {
            width: 20px;
            text-align: center;
            font-size: 16px;
            color: var(--muted);
            transition: color 0.25s;
        }

        .sidebar ul li a:hover {
            background: var(--rose-light);
            color: var(--rose-dark);
            border-color: var(--border);
        }

        .sidebar ul li a:hover i {
            color: var(--rose-dark);
        }

        .sidebar ul li a.active {
            background: var(--rose-light);
            color: var(--rose-dark);
            border-color: var(--rose);
            font-weight: 600;
        }

        .sidebar ul li a.active i {
            color: var(--rose-dark);
        }

        .sidebar .logout {
            margin-top: 50px;
            color: #b34a4a !important;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .sidebar .logout i {
            color: #b34a4a !important;
        }

        .sidebar .logout:hover {
            background: #fce8e6 !important;
            color: #a33c3c !important;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 30px 36px;
        }

        .header-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--brown);
        }

        .header-title h1 i {
            color: var(--rose);
            margin-right: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-actions button {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 13px;
            color: var(--text-color);
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }

        .header-actions button i {
            color: var(--rose);
        }

        .header-actions button:hover {
            background: var(--rose-light);
            border-color: var(--rose);
        }

        /* ===== الجدول ===== */
        .table-wrapper {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--rose-light);
            border-bottom: 2px solid var(--border-color);
        }

        th {
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--brown);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
            font-size: 14px;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--rose-light);
        }

        /* ===== اسم الزبون قابل للنقر ===== */
        .customer-name {
            color: var(--rose-dark);
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: transparent;
            transition: all 0.25s;
        }

        .customer-name:hover {
            color: var(--rose);
            text-decoration-color: var(--rose);
        }

        /* ===== حالة الطلب ===== */
        .status-badge {
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            letter-spacing: 0.3px;
        }

        .status-badge.paid {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-badge.pending {
            background: #fff8e1;
            color: #f57c00;
        }

        .status-badge.shipped {
            background: #e3f2fd;
            color: #0d47a1;
        }

        .status-badge.cancelled {
            background: #fbe9e7;
            color: #c62828;
        }

        .status-badge.delivered {
            background: #e0f7fa;
            color: #00695c;
        }

        /* ===== أزرار الإجراءات ===== */
        .action-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.25s;
            padding: 6px 10px;
            border-radius: 8px;
            margin: 0 3px;
        }

        .action-btn.view {
            color: #1976d2;
        }

        .action-btn.view:hover {
            background: #e3f2fd;
            transform: scale(1.1);
        }

        .action-btn.delete {
            color: #d32f2f;
        }

        .action-btn.delete:hover {
            background: #ffebee;
            transform: scale(1.1);
        }

        /* ===== نافذة التفاصيل ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 35px 40px;
            border-radius: 24px;
            width: 580px;
            max-width: 94%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            animation: slideUp 0.35s ease;
            position: relative;
        }

        .modal-content::-webkit-scrollbar {
            width: 6px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: var(--border-color);
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: var(--rose);
            border-radius: 10px;
        }

        .modal-content .modal-icon {
            text-align: center;
            font-size: 48px;
            color: var(--rose);
            margin-bottom: 10px;
        }

        .modal-content h2 {
            font-family: 'Playfair Display', serif;
            color: var(--brown);
            font-size: 26px;
            text-align: center;
            margin-bottom: 24px;
        }

        .modal-content .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            gap: 10px;
        }

        .modal-content .detail-row:last-of-type {
            border-bottom: none;
        }

        .modal-content .detail-label {
            font-weight: 500;
            color: var(--muted);
            font-size: 14px;
            min-width: 100px;
        }

        .modal-content .detail-value {
            font-weight: 600;
            color: var(--text-color);
            font-size: 14px;
            text-align: right;
            flex: 1;
        }

        .modal-content .detail-value .status-badge {
            font-size: 12px;
        }

        /* ===== قائمة المنتجات ===== */
        .products-list {
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .product-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--rose-light);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 13px;
            border: 1px solid var(--border-color);
        }

        .product-item .product-name {
            font-weight: 500;
            color: var(--text-color);
        }

        .product-item .product-qty {
            background: var(--card-bg);
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
            color: var(--rose-dark);
            font-size: 12px;
            border: 1px solid var(--rose);
        }

        .product-item .product-price {
            font-weight: 600;
            color: var(--brown);
        }

        .product-total {
            margin-top: 8px;
            text-align: right;
            font-weight: 600;
            color: var(--rose-dark);
            font-size: 14px;
            padding-top: 8px;
            border-top: 2px dashed var(--border-color);
        }

        /* ===== أزرار النافذة ===== */
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .modal-actions button {
            padding: 10px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s;
        }

        .modal-actions .btn-close {
            background: var(--border-color);
            color: var(--text-color);
        }

        .modal-actions .btn-close:hover {
            background: var(--muted);
            color: white;
        }

        .modal-actions .btn-edit {
            background: var(--rose);
            color: white;
        }

        .modal-actions .btn-edit:hover {
            background: var(--rose-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(238, 133, 135, 0.3);
        }

        /* ===== الرسوم المتحركة ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== رسالة فارغة ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state i {
            font-size: 48px;
            color: var(--border-color);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        /* ===== استجابة ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 16px 20px;
            }
            .sidebar .logo {
                margin-bottom: 18px;
            }
            .sidebar ul {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
            }
            .sidebar ul li {
                margin-bottom: 0;
            }
            .sidebar ul li a {
                padding: 8px 14px;
                font-size: 13px;
            }
            .sidebar .logout {
                margin-top: 0;
                border-top: none;
                padding-top: 0;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .header-title h1 {
                font-size: 22px;
            }
            table {
                font-size: 13px;
            }
            th, td {
                padding: 12px 14px;
            }
            .modal-content {
                padding: 25px 20px;
                width: 95%;
            }
            .modal-content .detail-row {
                flex-direction: column;
                gap: 4px;
            }
            .modal-content .detail-label {
                min-width: auto;
            }
            .modal-content .detail-value {
                text-align: left;
            }
            .product-item {
                flex-wrap: wrap;
                gap: 6px;
            }
        }

        @media (max-width: 480px) {
            th, td {
                padding: 10px 10px;
                font-size: 12px;
            }
            .status-badge {
                font-size: 10px;
                padding: 3px 10px;
            }
            .modal-content {
                padding: 20px 16px;
            }
            .modal-content h2 {
                font-size: 20px;
            }
            .modal-actions {
                flex-direction: column;
            }
            .modal-actions button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- ===== السايدبار ===== -->
    <aside class="sidebar">
        <a href="#" class="logo">
            <i class="fas fa-leaf"></i> Rose Admin
        </a>
        <ul>
            <li><a href="admin-dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="admin-products.html"><i class="fas fa-box"></i> Products</a></li>
            <li><a href="admin-orders.html" class="active"><i class="fas fa-shopping-bag"></i> Orders</a></li>
            <li><a href="admin-login.html" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>

    <!-- ===== المحتوى الرئيسي ===== -->
    <main class="main-content">
        <div class="header-title">
            <h1><i class="fas fa-shopping-bag"></i> Manage Orders</h1>
            <div class="header-actions">
                <button id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button id="darkToggle"><i class="fas fa-moon"></i> Dark</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <!-- سيتم تعبئة الطلبات هنا -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- ===== نافذة التفاصيل ===== -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-receipt"></i>
            </div>
            <h2>Order Details</h2>
            
            <div class="detail-row">
                <span class="detail-label"><i class="fas fa-hashtag"></i> Order ID</span>
                <span class="detail-value" id="detailId">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label"><i class="fas fa-user"></i> Customer</span>
                <span class="detail-value" id="detailCustomer">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label"><i class="fas fa-envelope"></i> Email</span>
                <span class="detail-value" id="detailEmail">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label"><i class="fas fa-phone"></i> Phone</span>
                <span class="detail-value" id="detailPhone">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label"><i class="fas fa-map-marker-alt"></i> Address</span>
                <span class="detail-value" id="detailAddress">-</span>
            </div>
            
            <!-- ===== قسم المنتجات ===== -->
            <div class="detail-row" style="flex-direction: column; align-items: stretch;">
                <span class="detail-label" style="margin-bottom: 8px;">
                    <i class="fas fa-shopping-cart"></i> Products
                </span>
                <div class="detail-value" id="detailProducts" style="text-align: left;">
                    <div class="products-list" id="productsList">
                        <!-- سيتم عرض المنتجات هنا -->
                    </div>
                </div>
            </div>
            
            <div class="detail-row">
                <span class="detail-label"><i class="fas fa-money-bill-wave"></i> Total</span>
                <span class="detail-value" id="detailTotal">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label"><i class="fas fa-clock"></i> Status</span>
                <span class="detail-value" id="detailStatus">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label"><i class="fas fa-calendar-alt"></i> Order Date</span>
                <span class="detail-value" id="detailDate">-</span>
            </div>

            <div class="modal-actions">
                <button class="btn-close" onclick="closeOrderModal()">
                    <i class="fas fa-times"></i> Close
                </button>
                <button class="btn-edit" onclick="editOrder()">
                    <i class="fas fa-edit"></i> Edit Status
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===== دالة لجلب الطلبات مع ضمان وجود products =====
        function getOrders() {
            let orders = JSON.parse(localStorage.getItem('adminOrders')) || [];
            
            // إذا كانت الطلبات فارغة، نضيف بيانات افتراضية
            if (orders.length === 0) {
                orders = [
                    { 
                        id: "#1045", 
                        customer: "Sarah M.", 
                        email: "sarah@email.com", 
                        phone: "+962 78 123 4567", 
                        address: "Amman, Jordan - 123 Street",
                        products: [
                            { name: "Rose Moisturizer", qty: 2, price: "15.00 JD" },
                            { name: "Lavender Toner", qty: 1, price: "12.00 JD" }
                        ],
                        total: "42.00 JD", 
                        status: "paid",
                        date: "2026-07-10"
                    },
                    { 
                        id: "#1044", 
                        customer: "John D.", 
                        email: "john@email.com", 
                        phone: "+962 79 234 5678", 
                        address: "Amman, Jordan - 456 Avenue",
                        products: [
                            { name: "Sunscreen SPF 50", qty: 1, price: "18.50 JD" },
                            { name: "Vitamin C Serum", qty: 1, price: "25.00 JD" }
                        ],
                        total: "43.50 JD", 
                        status: "pending",
                        date: "2026-07-10"
                    },
                    { 
                        id: "#1043", 
                        customer: "Layla K.", 
                        email: "layla@email.com", 
                        phone: "+962 77 345 6789", 
                        address: "Amman, Jordan - 789 Boulevard",
                        products: [
                            { name: "Rose Oil", qty: 3, price: "10.00 JD" },
                            { name: "Hand Cream", qty: 2, price: "8.50 JD" }
                        ],
                        total: "47.00 JD", 
                        status: "shipped",
                        date: "2026-07-09"
                    },
                    { 
                        id: "#1042", 
                        customer: "Omar H.", 
                        email: "omar@email.com", 
                        phone: "+962 78 456 7890", 
                        address: "Zarqa, Jordan - 321 Road",
                        products: [
                            { name: "Facial Cleanser", qty: 1, price: "12.00 JD" },
                            { name: "Moisturizer", qty: 1, price: "15.00 JD" }
                        ],
                        total: "27.00 JD", 
                        status: "delivered",
                        date: "2026-07-08"
                    },
                    { 
                        id: "#1041", 
                        customer: "Nadia R.", 
                        email: "nadia@email.com", 
                        phone: "+962 79 567 8901", 
                        address: "Irbid, Jordan - 654 Lane",
                        products: [
                            { name: "Perfume Gift Set", qty: 1, price: "35.00 JD" },
                            { name: "Lip Balm", qty: 2, price: "5.00 JD" }
                        ],
                        total: "45.00 JD", 
                        status: "cancelled",
                        date: "2026-07-07"
                    }
                ];
                localStorage.setItem('adminOrders', JSON.stringify(orders));
            }
            
            return orders;
        }

        let orders = getOrders();
        let currentOrderIndex = -1;

        // ===== عرض الطلبات =====
        function renderOrders() {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '';

            if (orders.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <i class="fas fa-shopping-bag"></i>
                                <h3>No Orders Yet</h3>
                                <p>Orders will appear here once customers make purchases.</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            orders.forEach((o, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${o.id}</strong></td>
                    <td>
                        <span class="customer-name" onclick="viewOrder(${index})">
                            <i class="fas fa-user-circle"></i> ${o.customer}
                        </span>
                    </td>
                    <td><strong>${o.total}</strong></td>
                    <td><span class="status-badge ${o.status}">${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span></td>
                    <td>
                        <button class="action-btn view" onclick="viewOrder(${index})" title="View Details">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="action-btn delete" onclick="deleteOrder(${index})" title="Delete Order">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ===== عرض المنتجات في النافذة =====
        function renderProducts(products) {
            const container = document.getElementById('productsList');
            container.innerHTML = '';
            
            if (!products || products.length === 0) {
                container.innerHTML = '<div style="color: var(--muted); font-weight: 400; text-align: center; padding: 10px;">📦 No products in this order</div>';
                return;
            }

            // التأكد من أن كل منتج يحتوي على الخصائص المطلوبة
            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'product-item';
                const name = p.name || p.productName || 'Unknown Product';
                const qty = p.qty || p.quantity || 1;
                const price = p.price || p.productPrice || '0.00 JD';
                item.innerHTML = `
                    <span class="product-name"><i class="fas fa-circle" style="font-size: 8px; color: var(--rose); margin-right: 8px;"></i>${name}</span>
                    <span class="product-qty">×${qty}</span>
                    <span class="product-price">${price}</span>
                `;
                container.appendChild(item);
            });

            // حساب المجموع الكلي للمنتجات
            let total = 0;
            products.forEach(p => {
                const priceStr = p.price || p.productPrice || '0';
                const price = parseFloat(priceStr.toString().replace(' JD', '').trim());
                const qty = p.qty || p.quantity || 1;
                if (!isNaN(price)) total += price * qty;
            });
            
            if (total > 0) {
                const totalDiv = document.createElement('div');
                totalDiv.className = 'product-total';
                totalDiv.innerHTML = `<i class="fas fa-calculator"></i> Subtotal: ${total.toFixed(2)} JD`;
                container.appendChild(totalDiv);
            }
        }

        // ===== عرض تفاصيل الطلب =====
        function viewOrder(index) {
            currentOrderIndex = index;
            const o = orders[index];
            
            if (!o) {
                alert('Order not found!');
                return;
            }
            
            document.getElementById('detailId').innerHTML = `<strong>${o.id || 'N/A'}</strong>`;
            document.getElementById('detailCustomer').innerHTML = `<i class="fas fa-user"></i> ${o.customer || 'N/A'}`;
            document.getElementById('detailEmail').innerHTML = `<i class="fas fa-envelope"></i> ${o.email || 'N/A'}`;
            document.getElementById('detailPhone').innerHTML = `<i class="fas fa-phone"></i> ${o.phone || 'N/A'}`;
            document.getElementById('detailAddress').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${o.address || 'N/A'}`;
            
            // عرض المنتجات - مهم جداً: نتحقق من وجود products
            console.log('Order products:', o.products); // للتأكد من وجود المنتجات
            
            // إذا كان o.products عبارة عن مصفوفة، نعرضها، وإلا نعرض رسالة
            if (o.products && Array.isArray(o.products) && o.products.length > 0) {
                renderProducts(o.products);
            } else {
                // محاولة استخراج المنتجات من items إذا وجدت
                if (o.items && Array.isArray(o.items) && o.items.length > 0) {
                    renderProducts(o.items);
                } else {
                    document.getElementById('productsList').innerHTML = 
                        '<div style="color: var(--muted); font-weight: 400; text-align: center; padding: 10px;">📦 No product details available</div>';
                }
            }
            
            document.getElementById('detailTotal').innerHTML = `<strong>${o.total || '0.00 JD'}</strong>`;
            document.getElementById('detailStatus').innerHTML = `<span class="status-badge ${o.status || 'pending'}">${(o.status || 'pending').charAt(0).toUpperCase() + (o.status || 'pending').slice(1)}</span>`;
            document.getElementById('detailDate').innerHTML = `<i class="fas fa-calendar-alt"></i> ${o.date || 'N/A'}`;
            
            document.getElementById('orderModal').style.display = 'flex';
        }

        // ===== إغلاق النافذة =====
        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        // ===== تعديل حالة الطلب =====
        function editOrder() {
            if (currentOrderIndex === -1) return;
            
            const statuses = ['pending', 'paid', 'shipped', 'delivered', 'cancelled'];
            const currentStatus = orders[currentOrderIndex].status || 'pending';
            const currentIndex = statuses.indexOf(currentStatus);
            const nextIndex = (currentIndex + 1) % statuses.length;
            const newStatus = statuses[nextIndex];
            
            orders[currentOrderIndex].status = newStatus;
            localStorage.setItem('adminOrders', JSON.stringify(orders));
            renderOrders();
            
            // تحديث النافذة
            viewOrder(currentOrderIndex);
            
            // إشعار بسيط
            const btn = document.querySelector('.btn-edit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Updated!';
            btn.style.background = '#4caf50';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '';
            }, 1500);
        }

        // ===== حذف الطلب =====
        function deleteOrder(index) {
            if (!confirm("Are you sure you want to delete this order?")) return;
            orders.splice(index, 1);
            localStorage.setItem('adminOrders', JSON.stringify(orders));
            renderOrders();
            closeOrderModal();
        }

        // ===== إغلاق النافذة عند النقر خارجها =====
        document.getElementById('orderModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeOrderModal();
            }
        });

        // ===== إغلاق النافذة بضغط ESC =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeOrderModal();
            }
        });

        // ===== زر التحديث =====
        document.getElementById('refreshBtn').addEventListener('click', function() {
            orders = getOrders();
            renderOrders();
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Refreshing...';
            setTimeout(() => {
                this.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh';
            }, 600);
        });

        // ===== الوضع الليلي =====
        let dark = false;
        document.getElementById('darkToggle').addEventListener('click', function() {
            dark = !dark;
            document.body.classList.toggle('dark-mode', dark);
            this.innerHTML = dark ? '<i class="fas fa-sun"></i> Light' : '<i class="fas fa-moon"></i> Dark';
        });

        // ===== تحميل البيانات =====
        renderOrders();
    </script>
</body>
</html>

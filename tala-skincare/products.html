<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Rose Skincare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== متغيرات الورد ===== */
        :root {
            --rose: #ee8587;
            --rose-dark: #c96c6f;
            --rose-light: #fff1ee;
            --brown: #4b2d29;
            --cream: #fffaf7;
            --white: #ffffff;
            --text: #322725;
            --muted: #746764;
            --border: #f3dfda;
            --shadow: 0 18px 40px rgba(153, 84, 77, 0.14);
            
            --bg-color: var(--cream);
            --card-bg: var(--white);
            --text-color: var(--text);
            --primary: var(--rose);
            --primary-dark: var(--rose-dark);
            --primary-light: var(--rose-light);
            --border-color: var(--border);
            --img-bg: var(--rose-light);
            --price-color: var(--rose-dark);
            --star-color: #FFB300;
        }

        body.dark-mode {
            --bg-color: #1f1418;
            --card-bg: #2d1e22;
            --text-color: #f5e2e0;
            --border-color: #5a3d3a;
            --shadow: 0 18px 40px rgba(0,0,0,0.3);
            --primary: #f09a9c;
            --primary-dark: #d68083;
            --img-bg: #3a2430;
            --price-color: #f09a9c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); transition: background 0.3s, color 0.3s; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { max-width: 1400px; width: 100%; }

        /* ===== الهيدر ===== */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            transition: background 0.3s, border-color 0.3s;
            flex-wrap: wrap;
            gap: 12px;
        }

        .top-header .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--brown);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            cursor: pointer;
        }

        .top-header .logo i { color: var(--rose); font-size: 30px; }

        .header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .header-links { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

        .header-links a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .header-links a:hover { background: var(--rose-light); color: var(--rose-dark); }
        .header-links a i { margin-right: 4px; }
        .header-links a .fa-heart { color: var(--rose); }
        .header-links a .fa-shopping-cart { color: var(--rose-dark); }

        .header-actions .theme-btn,
        .header-actions .lang-switch-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-color);
            transition: all 0.3s;
        }

        .header-actions .theme-btn:hover,
        .header-actions .lang-switch-btn:hover {
            background: var(--rose-light);
            border-color: var(--rose);
        }

        /* ===== باقي الأنماط ===== */
        .section-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 30px; color: var(--brown); margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .section-title i { color: var(--rose); }

        .search-filter-wrapper { display: flex; flex-direction: column; align-items: center; gap: 18px; margin-bottom: 35px; }
        .search-container { position: relative; width: 100%; max-width: 500px; }
        .search-container input { width: 100%; padding: 13px 20px; padding-right: 50px; border: 2px solid var(--border-color); border-radius: 30px; outline: none; font-size: 15px; background: var(--card-bg); color: var(--text-color); transition: all 0.3s; }
        .search-container input:focus { border-color: var(--rose); box-shadow: 0 0 0 4px rgba(238, 133, 135, 0.12); }
        .search-container input::placeholder { color: var(--muted); opacity: 0.7; }
        .search-container i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }

        .filter-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .filter-btn { background: var(--card-bg); border: 2px solid var(--border-color); padding: 8px 22px; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; color: var(--text-color); }
        .filter-btn:hover { border-color: var(--rose); background: var(--rose-light); }
        .filter-btn.active { background: var(--rose); color: white; border-color: var(--rose); box-shadow: 0 4px 15px rgba(238, 133, 135, 0.3); }

        .product-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 22px; margin-top: 10px; }
        .product-card-wrapper { position: relative; text-decoration: none; color: inherit; display: block; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card-wrapper:hover { transform: translateY(-8px); }
        .product-card-wrapper:hover .product-card { box-shadow: 0 20px 45px rgba(153, 84, 77, 0.2); border-color: var(--rose); }
        .product-card { background: var(--card-bg); border-radius: 16px; padding: 20px 16px 16px; text-align: center; transition: all 0.3s; box-shadow: var(--shadow); border: 2px solid transparent; height: 100%; display: flex; flex-direction: column; border-color: var(--border-color); }

        .product-img-wrapper { background: var(--img-bg); border-radius: 12px; padding: 15px; margin-bottom: 14px; height: 180px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); transition: border-color 0.3s; }
        .product-card-wrapper:hover .product-img-wrapper { border-color: var(--rose); }
        .product-img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.3s; }
        .product-card-wrapper:hover .product-img-wrapper img { transform: scale(1.05); }

        .product-title { font-size: 14px; font-weight: 600; color: var(--text-color); margin-bottom: 6px; min-height: 40px; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
        .price-row { display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .product-price { font-size: 16px; font-weight: 700; color: var(--price-color); }
        .product-old-price { font-size: 13px; color: var(--muted); text-decoration: line-through; }
        .product-rating { color: var(--star-color); font-size: 12px; margin-top: 4px; }

        .stock-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-top: 4px; }
        .stock-badge.almost { background: #fff8e1; color: #f57c00; }
        .stock-badge.out { background: #fbe9e7; color: #c62828; }

        .wishlist-btn { position: absolute; top: 12px; right: 12px; background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.08); font-size: 16px; color: var(--muted); transition: all 0.3s; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .wishlist-btn:hover { transform: scale(1.12); border-color: var(--rose); }
        .wishlist-btn.active { color: #e74c3c; border-color: #e74c3c; background: #fff5f5; }
        body.dark-mode .wishlist-btn.active { background: #3a1a1a; border-color: #e74c3c; }

        .disabled-link { pointer-events: none; opacity: 0.6; }
        .disabled-link .product-card { filter: grayscale(0.3); }

        @media (max-width: 1200px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 992px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .top-header { flex-direction: column; align-items: stretch; gap: 12px; padding: 15px 20px; } .header-actions { flex-direction: column; gap: 10px; } .header-links { justify-content: center; } .product-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } .section-title { font-size: 24px; } .filter-btn { padding: 6px 14px; font-size: 12px; } }
        @media (max-width: 480px) { .top-header .logo { font-size: 22px; } .header-links a { font-size: 12px; padding: 4px 8px; } .product-grid { grid-template-columns: 1fr 1fr; gap: 12px; } .product-img-wrapper { height: 130px; padding: 10px; } .product-title { font-size: 12px; min-height: 32px; } .product-price { font-size: 14px; } .product-card { padding: 14px 10px 12px; } .wishlist-btn { width: 30px; height: 30px; font-size: 13px; top: 8px; right: 8px; } .search-container input { font-size: 13px; padding: 10px 16px; padding-right: 40px; } .filter-container { gap: 6px; } .filter-btn { padding: 5px 12px; font-size: 11px; } }
        @media (max-width: 380px) { .product-grid { grid-template-columns: 1fr; max-width: 280px; margin: 0 auto; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== الهيدر ===== -->
        <header class="top-header">
            <a href="index.html" class="logo">
                <i class="fas fa-leaf"></i> ROSE
            </a>
            <div class="header-actions">
                <div class="header-links">
                    <a href="index.html" id="linkHome"><i class="fas fa-home"></i> Home</a>
                    <a href="products.html" id="linkProducts"><i class="fas fa-box"></i> Products</a>
                    <a href="offers.html" id="linkOffers" style="color: var(--rose);"><i class="fas fa-tags"></i> Offers</a>
                    <a href="wishlist.html" id="linkWishlist"><i class="fas fa-heart"></i> Wishlist</a>
                    <a href="cart.html" id="linkCart"><i class="fas fa-shopping-cart"></i> Cart</a>
                    <a href="javascript:void(0)" id="linkLogin" onclick="goToLogin()">
                        <i class="fas fa-user"></i> Login
                    </a>
                </div>
                <button class="lang-switch-btn" onclick="toggleLang()" id="langBtn">🌐</button>
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
            </div>
        </header>

        <!-- ===== العنوان ===== -->
        <h2 class="section-title">
            <i class="fas fa-box"></i>
            <span id="pageTitle">Our Skincare Collection</span>
        </h2>

        <!-- ===== البحث والفلترة ===== -->
        <div class="search-filter-wrapper">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search for products..." onkeyup="filterAndSearch()">
                <i class="fas fa-search"></i>
            </div>
            <div class="filter-container">
                <button class="filter-btn active" onclick="setCategory('all')" id="filterAll">All</button>
                <button class="filter-btn" onclick="setCategory('cleanser')" id="filterCleanser">Cleansers</button>
                <button class="filter-btn" onclick="setCategory('toner')" id="filterToner">Toners</button>
                <button class="filter-btn" onclick="setCategory('moisturizer')" id="filterMoist">Moisturizers</button>
                <button class="filter-btn" onclick="setCategory('sunscreen')" id="filterSun">Sunscreens</button>
                <button class="filter-btn" onclick="setCategory('perfume')" id="filterPerfume">Perfumes</button>
            </div>
        </div>

        <!-- ===== شبكة المنتجات ===== -->
        <div class="product-grid" id="productGrid"></div>
    </div>

    <script>
        // ===== دالة للذهاب إلى صفحة تسجيل الدخول =====
        function goToLogin() {
            try {
                window.location.href = 'login.html';
            } catch(e) {
                try {
                    window.location.href = './login.html';
                } catch(e2) {
                    try {
                        window.location.href = '/login.html';
                    } catch(e3) {
                        alert('⚠️ Unable to find login page. Please make sure login.html exists in the same folder.');
                    }
                }
            }
        }

        let products = JSON.parse(localStorage.getItem('adminProducts')) || [];
        let currentCategory = 'all';
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            if (products.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted);"><i class="fas fa-box-open" style="font-size:48px; color:var(--border-color); margin-bottom:16px; display:block;"></i><h3 style="color:var(--text-color); font-size:20px;">No Products Available</h3><p>Check back soon for new arrivals!</p></div>`;
                return;
            }

            products.forEach((p) => {
                const productCategory = (p.category || '').toLowerCase().trim();
                if (currentCategory !== 'all' && productCategory !== currentCategory.toLowerCase()) return;

                let discountHtml = '';
                let finalPrice = p.price;
                
                // استخراج السعر الرقمي
                let priceNum = parseFloat(p.price);
                if (isNaN(priceNum)) {
                    priceNum = parseFloat(p.price.replace(' ₪', '').replace(' JD', ''));
                }
                if (isNaN(priceNum)) priceNum = 0;
                
                if (p.discount && p.discount > 0) {
                    const discounted = priceNum * (1 - p.discount / 100);
                    finalPrice = discounted.toFixed(2) + ' ₪';
                    discountHtml = `<span class="product-old-price">${priceNum.toFixed(2)} ₪</span>`;
                } else {
                    finalPrice = priceNum.toFixed(2) + ' ₪';
                }

                let stockBadge = '';
                let linkDisabled = '';
                if (p.stock > 0 && p.stock <= 5) { stockBadge = `<div class="stock-badge almost">⚠️ Almost Sold Out</div>`; } 
                else if (p.stock === 0) { stockBadge = `<div class="stock-badge out">❌ Out of Stock</div>`; linkDisabled = 'disabled-link'; }
                
                const isFav = wishlist.some(item => item.name === p.name);
                const favClass = isFav ? 'active' : '';
                const favIcon = isFav ? 'fas fa-heart' : 'far fa-heart';
                
                const wrapper = document.createElement('div');
                wrapper.className = `product-card-wrapper ${linkDisabled}`;
                wrapper.innerHTML = `
                    <button class="wishlist-btn ${favClass}" onclick="toggleWishlist(this, '${p.name}', '${p.img}', '${finalPrice}')"><i class="${favIcon}"></i></button>
                    <a href="product-details.html?product=${encodeURIComponent(p.name)}" class="product-link">
                        <div class="product-card">
                            <div class="product-img-wrapper"><img src="${p.img || 'https://via.placeholder.com/200/fff1ee/ee8587?text=Rose'}" alt="${p.name}" loading="lazy"></div>
                            <div class="product-title">${p.name}</div>
                            <div class="price-row"><span class="product-price">${finalPrice}</span>${discountHtml}</div>
                            ${stockBadge}
                            <div class="product-rating"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                        </div>
                    </a>
                `;
                grid.appendChild(wrapper);
            });
        }

        function toggleWishlist(btn, name, img, price) {
            const exists = wishlist.some(item => item.name === name);
            if (exists) { wishlist = wishlist.filter(item => item.name !== name); btn.classList.remove('active'); btn.innerHTML = '<i class="far fa-heart"></i>'; } 
            else { wishlist.push({ name, img, price }); btn.classList.add('active'); btn.innerHTML = '<i class="fas fa-heart"></i>'; }
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
        }

        function setCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[onclick*="${category}"]`).classList.add('active');
            renderProducts();
        }

        function filterAndSearch() {
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            const filtered = products.filter(p => {
                const productCategory = (p.category || '').toLowerCase().trim();
                const matchCat = currentCategory === 'all' || productCategory === currentCategory.toLowerCase();
                const matchName = p.name.toLowerCase().includes(searchText);
                return matchCat && matchName;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted);"><i class="fas fa-search" style="font-size:48px; color:var(--border-color); margin-bottom:16px; display:block;"></i><h3 style="color:var(--text-color); font-size:20px;">No Products Found</h3><p>Try adjusting your search or filter</p></div>`;
                return;
            }

            filtered.forEach((p) => {
                let discountHtml = '';
                let finalPrice = p.price;
                
                let priceNum = parseFloat(p.price);
                if (isNaN(priceNum)) {
                    priceNum = parseFloat(p.price.replace(' ₪', '').replace(' JD', ''));
                }
                if (isNaN(priceNum)) priceNum = 0;
                
                if (p.discount && p.discount > 0) {
                    const discounted = priceNum * (1 - p.discount / 100);
                    finalPrice = discounted.toFixed(2) + ' ₪';
                    discountHtml = `<span class="product-old-price">${priceNum.toFixed(2)} ₪</span>`;
                } else {
                    finalPrice = priceNum.toFixed(2) + ' ₪';
                }

                let stockBadge = '';
                let linkDisabled = '';
                if (p.stock > 0 && p.stock <= 5) { stockBadge = `<div class="stock-badge almost">⚠️ Almost Sold Out</div>`; } 
                else if (p.stock === 0) { stockBadge = `<div class="stock-badge out">❌ Out of Stock</div>`; linkDisabled = 'disabled-link'; }

                const isFav = wishlist.some(item => item.name === p.name);
                const favClass = isFav ? 'active' : '';
                const favIcon = isFav ? 'fas fa-heart' : 'far fa-heart';

                const wrapper = document.createElement('div');
                wrapper.className = `product-card-wrapper ${linkDisabled}`;
                wrapper.innerHTML = `
                    <button class="wishlist-btn ${favClass}" onclick="toggleWishlist(this, '${p.name}', '${p.img}', '${finalPrice}')"><i class="${favIcon}"></i></button>
                    <a href="product-details.html?product=${encodeURIComponent(p.name)}" class="product-link">
                        <div class="product-card">
                            <div class="product-img-wrapper"><img src="${p.img || 'https://via.placeholder.com/200/fff1ee/ee8587?text=Rose'}" alt="${p.name}" loading="lazy"></div>
                            <div class="product-title">${p.name}</div>
                            <div class="price-row"><span class="product-price">${finalPrice}</span>${discountHtml}</div>
                            ${stockBadge}
                            <div class="product-rating"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                        </div>
                    </a>
                `;
                grid.appendChild(wrapper);
            });
        }

        const translations = {
            en: { home: "Home", products: "Products", offers: "Offers", wishlist: "Wishlist", cart: "Cart", login: "Login", title: "Our Skincare Collection", all: "All", cleanser: "Cleansers", toner: "Toners", moist: "Moisturizers", sun: "Sunscreens", perfume: "Perfumes", search: "Search for products...", langBtn: "🌐" },
            ar: { home: "الرئيسية", products: "المنتجات", offers: "خصومات", wishlist: "المفضلة", cart: "السلة", login: "دخول", title: "مجموعة العناية بالبشرة", all: "الكل", cleanser: "غسول", toner: "تونر", moist: "مرطبات", sun: "واقي شمس", perfume: "عطور", search: "ابحث عن منتجات...", langBtn: "🌐" }
        };
        let currentLang = 'en';

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            const t = translations[currentLang];
            document.getElementById('linkHome').innerHTML = `<i class="fas fa-home"></i> ${t.home}`;
            document.getElementById('linkProducts').innerHTML = `<i class="fas fa-box"></i> ${t.products}`;
            document.getElementById('linkOffers').innerHTML = `<i class="fas fa-tags"></i> ${t.offers}`;
            document.getElementById('linkWishlist').innerHTML = `<i class="fas fa-heart"></i> ${t.wishlist}`;
            document.getElementById('linkCart').innerHTML = `<i class="fas fa-shopping-cart"></i> ${t.cart}`;
            document.getElementById('linkLogin').innerHTML = `<i class="fas fa-user"></i> ${t.login}`;
            document.getElementById('pageTitle').innerText = t.title;
            document.getElementById('filterAll').innerText = t.all;
            document.getElementById('filterCleanser').innerText = t.cleanser;
            document.getElementById('filterToner').innerText = t.toner;
            document.getElementById('filterMoist').innerText = t.moist;
            document.getElementById('filterSun').innerText = t.sun;
            document.getElementById('filterPerfume').innerText = t.perfume;
            document.getElementById('searchInput').placeholder = t.search;
            document.getElementById('langBtn').innerText = t.langBtn;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('themeBtn');
            if (document.body.classList.contains('dark-mode')) { btn.innerHTML = '☀️'; localStorage.setItem('theme', 'dark'); } 
            else { btn.innerHTML = '🌙'; localStorage.setItem('theme', 'light'); }
        }

        window.onload = function() {
            wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            renderProducts();
            if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('themeBtn').innerHTML = '☀️'; }
        };

        // ===== دالة إضافة إلى السلة مع التحقق من تسجيل الدخول =====
        function addToCart(product) {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            if (!isLoggedIn) {
                localStorage.setItem('redirectAfterLogin', window.location.href);
                alert('⚠️ Please login first to add products to cart.');
                window.location.href = 'login.html';
                return;
            }

            let cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
            const existing = cart.find(item => item.id === product.id);
            
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    img: product.img || 'https://via.placeholder.com/200/fff1ee/ee8587?text=Rose',
                    price: parseFloat(product.price) || 10,
                    qty: 1
                });
            }
            
            localStorage.setItem('shoppingCart', JSON.stringify(cart));
            alert(`✅ ${product.name} added to cart!`);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Rose Skincare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== متغيرات الورد ===== */
        :root {
            --rose: #ee8587;
            --rose-dark: #c96c6f;
            --rose-light: #fff1ee;
            --brown: #4b2d29;
            --cream: #fffaf7;
            --white: #ffffff;
            --text: #322725;
            --muted: #746764;
            --border: #f3dfda;
            --shadow: 0 18px 40px rgba(153, 84, 77, 0.14);
            
            --bg-color: var(--cream);
            --card-bg: var(--white);
            --text-color: var(--text);
            --primary: var(--rose);
            --primary-dark: var(--rose-dark);
            --primary-light: var(--rose-light);
            --border-color: var(--border);
            --img-bg: var(--rose-light);
            --star-active: #FFB300;
            --star-inactive: #ddd;
            --input-bg: var(--cream);
            --img-shadow: 0 6px 20px rgba(153, 84, 77, 0.12);
            --discount-red: #e74c3c;
        }

        /* ===== الوضع الليلي ===== */
        body.dark-mode {
            --bg-color: #1f1418;
            --card-bg: #2d1e22;
            --text-color: #f5e2e0;
            --border-color: #5a3d3a;
            --shadow: 0 18px 40px rgba(0,0,0,0.3);
            --primary: #f09a9c;
            --primary-dark: #d68083;
            --img-bg: #3a2430;
            --star-inactive: #555;
            --input-bg: #3a2430;
            --img-shadow: 0 6px 20px rgba(255,255,255,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
        }

        /* ===== رأس الصفحة ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-header .back-link {
            color: var(--muted);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid transparent;
        }

        .page-header .back-link:hover {
            color: var(--rose);
            background: var(--rose-light);
            border-color: var(--border);
        }

        .page-header .back-link i {
            font-size: 14px;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .lang-btn,
        .theme-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-color);
            transition: all 0.3s;
        }

        .lang-btn:hover,
        .theme-btn:hover {
            border-color: var(--rose);
            background: var(--rose-light);
        }

        /* ===== محتوى المنتج ===== */
        .product-content {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        /* ===== صورة المنتج ===== */
        .image-box {
            flex: 1;
            min-width: 300px;
            max-width: 500px;
            background: var(--img-bg);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            box-shadow: var(--img-shadow);
            margin: 0 auto;
            border: 2px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .image-box::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(238, 133, 135, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .image-box img {
            max-width: 100%;
            max-height: 450px;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            position: relative;
            z-index: 1;
        }

        /* ===== المعلومات ===== */
        .info-box {
            flex: 1.2;
            min-width: 280px;
            display: flex;
            flex-direction: column;
        }

        .info-box h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--brown);
            margin-bottom: 6px;
            font-weight: 700;
        }

        /* ===== السعر ===== */
        .price-section {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin: 12px 0 16px;
        }

        .info-box .price {
            display: block;
            font-size: 30px;
            font-weight: 700;
            color: var(--rose-dark);
        }

        .info-box .old-price {
            font-size: 18px;
            color: var(--muted);
            text-decoration: line-through;
        }

        .info-box .discount-tag {
            background: var(--discount-red);
            color: white;
            padding: 3px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.25);
        }

        /* ===== الوصف ===== */
        .info-box .desc {
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* ===== التقييم ===== */
        .rating-section {
            margin: 16px 0 18px;
        }

        .stars-container {
            display: flex;
            gap: 4px;
            cursor: pointer;
        }

        .stars-container i {
            font-size: 26px;
            color: var(--star-inactive);
            transition: all 0.2s;
        }

        .stars-container i.active {
            color: var(--star-active);
        }

        .stars-container i:hover {
            transform: scale(1.1);
        }

        .rating-info {
            display: block;
            margin-top: 6px;
            font-size: 14px;
            color: var(--muted);
        }

        .rating-info strong {
            color: var(--text-color);
            font-weight: 600;
        }

        /* ===== الكمية ===== */
        .qty-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0 18px;
            flex-wrap: wrap;
        }

        .qty-box label {
            font-weight: 500;
            color: var(--text-color);
            font-size: 14px;
        }

        .qty-box input {
            width: 60px;
            padding: 10px;
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--text-color);
            outline: none;
            transition: border-color 0.3s;
        }

        .qty-box input:focus {
            border-color: var(--rose);
            box-shadow: 0 0 0 4px rgba(238, 133, 135, 0.12);
        }

        .qty-box input::-webkit-inner-spin-button {
            opacity: 1;
        }

        .qty-box button {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-color);
            background: var(--card-bg);
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-color);
            transition: all 0.3s;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-box button:hover {
            background: var(--rose);
            color: white;
            border-color: var(--rose);
            transform: scale(1.05);
        }

        /* ===== زر إضافة للسلة ===== */
        .btn-cart {
            background: var(--rose);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(238, 133, 135, 0.3);
        }

        .btn-cart:hover {
            background: var(--rose-dark);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(201, 108, 111, 0.4);
        }

        .btn-cart i {
            font-size: 18px;
        }

        /* ===== التعليقات ===== */
        .comments-section {
            margin-top: 30px;
            border-top: 2px solid var(--border-color);
            padding-top: 25px;
            transition: border-color 0.3s;
        }

        .comments-section h3 {
            color: var(--brown);
            margin-bottom: 16px;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .comments-section h3 i {
            color: var(--rose);
        }

        .comment-item {
            background: var(--rose-light);
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
        }

        .comment-item .comment-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            flex-wrap: wrap;
            gap: 6px;
        }

        .comment-item .comment-stars {
            color: var(--star-active);
            font-size: 12px;
        }

        .comment-item p {
            color: var(--muted);
            font-size: 14px;
            margin-top: 6px;
            line-height: 1.6;
        }

        .no-comments {
            color: var(--muted);
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        /* ===== إضافة تعليق ===== */
        .add-comment-box {
            background: var(--rose-light);
            padding: 22px 24px;
            border-radius: 16px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
        }

        .add-comment-box h4 {
            color: var(--brown);
            margin-bottom: 14px;
            font-size: 16px;
            font-weight: 600;
        }

        .add-comment-box input,
        .add-comment-box textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            outline: none;
            margin-bottom: 12px;
            font-family: inherit;
            background: var(--input-bg);
            color: var(--text-color);
            transition: border-color 0.3s, box-shadow 0.3s;
            font-size: 14px;
        }

        .add-comment-box input:focus,
        .add-comment-box textarea:focus {
            border-color: var(--rose);
            box-shadow: 0 0 0 4px rgba(238, 133, 135, 0.12);
        }

        .add-comment-box textarea {
            height: 80px;
            resize: vertical;
        }

        .add-comment-box button {
            background: var(--rose);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(238, 133, 135, 0.2);
        }

        .add-comment-box button:hover {
            background: var(--rose-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 108, 111, 0.3);
        }

        /* ===== استجابة ===== */
        @media (max-width: 768px) {
            .container {
                padding: 25px 20px;
            }

            .product-content {
                flex-direction: column;
                align-items: center;
            }

            .image-box {
                min-width: 100%;
                max-width: 100%;
                padding: 30px 20px;
                min-height: 250px;
            }

            .image-box img {
                max-height: 300px;
            }

            .info-box {
                min-width: 100%;
            }

            .info-box h1 {
                font-size: 26px;
            }

            .info-box .price {
                font-size: 24px;
            }

            .page-header {
                flex-direction: column;
                align-items: stretch;
            }

            .header-buttons {
                justify-content: flex-end;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px 10px;
            }

            .container {
                padding: 18px 14px;
            }

            .info-box h1 {
                font-size: 22px;
            }

            .info-box .price {
                font-size: 20px;
            }

            .image-box {
                padding: 20px 15px;
                min-height: 200px;
            }

            .image-box img {
                max-height: 220px;
            }

            .qty-box {
                gap: 8px;
            }

            .qty-box button {
                width: 34px;
                height: 34px;
                font-size: 16px;
            }

            .qty-box input {
                width: 50px;
                padding: 8px;
            }

            .btn-cart {
                padding: 12px 20px;
                font-size: 14px;
            }

            .add-comment-box {
                padding: 16px;
            }

            .stars-container i {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== رأس الصفحة ===== -->
        <div class="page-header">
            <a href="products.html" class="back-link" id="backLink">
                <i class="fas fa-arrow-left"></i> <span id="backText">Back to Products</span>
            </a>
            <div class="header-buttons">
                <button class="lang-btn" onclick="toggleLang()" id="langBtn">🌐</button>
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
            </div>
        </div>

        <!-- ===== محتوى المنتج ===== -->
        <div class="product-content">
            <!-- صورة المنتج -->
            <div class="image-box">
                <img id="productImage" src="https://via.placeholder.com/300/fff1ee/ee8587?text=Rose" alt="Product Image">
            </div>
            
            <!-- المعلومات -->
            <div class="info-box">
                <h1 id="productTitle">Loading...</h1>
                
                <!-- السعر مع الخصم -->
                <div class="price-section">
                    <span class="price" id="productPrice">0.00 ₪</span>
                    <span class="old-price" id="oldPrice" style="display:none;"></span>
                    <span class="discount-tag" id="discountTag" style="display:none;">-0%</span>
                </div>
                
                <p class="desc" id="productDesc">Loading description...</p>
                
                <!-- التقييم -->
                <div class="rating-section">
                    <div class="stars-container" id="starsContainer">
                        <i class="far fa-star" data-star="1"></i>
                        <i class="far fa-star" data-star="2"></i>
                        <i class="far fa-star" data-star="3"></i>
                        <i class="far fa-star" data-star="4"></i>
                        <i class="far fa-star" data-star="5"></i>
                    </div>
                    <span class="rating-info">
                        <strong id="ratingCount">0</strong> <span id="reviewsLabel">Reviews</span>
                    </span>
                </div>
                
                <!-- الكمية -->
                <div class="qty-box">
                    <label id="qtyLabel">Quantity:</label>
                    <button onclick="document.getElementById('qty').stepDown()">−</button>
                    <input type="number" id="qty" value="1" min="1">
                    <button onclick="document.getElementById('qty').stepUp()">+</button>
                </div>
                
                <!-- زر إضافة للسلة -->
                <button class="btn-cart" onclick="handleAddToCart()">
                    <i class="fas fa-shopping-cart"></i> <span id="addText">Add to Cart</span>
                </button>

                <!-- التعليقات -->
                <div class="comments-section">
                    <h3><i class="fas fa-comments"></i> <span id="reviewsTitle">Customer Reviews</span></h3>
                    <div id="commentsContainer">
                        <p class="no-comments" id="noReviewsText">No reviews yet. Be the first to review!</p>
                    </div>
                    
                    <!-- إضافة تعليق -->
                    <div class="add-comment-box">
                        <h4 id="addReviewTitle"><i class="fas fa-pen"></i> Add a Review</h4>
                        <input type="text" id="userName" placeholder="Your Name" required>
                        <textarea id="userComment" placeholder="Write your comment here..." required></textarea>
                        <button onclick="addReview()" id="submitBtn">
                            <i class="fas fa-paper-plane"></i> Submit Review
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // تحميل بيانات المنتج من LocalStorage
        // ============================================================
        const products = JSON.parse(localStorage.getItem('adminProducts')) || [];
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('product');
        const foundProduct = products.find(p => p.name === productName);

        if (foundProduct) {
            document.getElementById('productTitle').innerText = foundProduct.name;
            
            // عرض السعر مع الخصم
            let displayPrice = foundProduct.price;
            let discountPercent = foundProduct.discount || 0;
            
            // استخراج السعر الرقمي
            let priceNum = parseFloat(foundProduct.price);
            if (isNaN(priceNum)) {
                priceNum = parseFloat(foundProduct.price.replace(' ₪', '').replace(' JD', ''));
            }
            if (isNaN(priceNum)) priceNum = 0;
            
            if (discountPercent > 0) {
                const discountedPrice = priceNum * (1 - discountPercent / 100);
                displayPrice = discountedPrice.toFixed(2) + ' ₪';
                
                document.getElementById('oldPrice').innerText = priceNum.toFixed(2) + ' ₪';
                document.getElementById('oldPrice').style.display = 'inline';
                document.getElementById('discountTag').innerText = `-${discountPercent}%`;
                document.getElementById('discountTag').style.display = 'inline';
            } else {
                displayPrice = priceNum.toFixed(2) + ' ₪';
                document.getElementById('oldPrice').style.display = 'none';
                document.getElementById('discountTag').style.display = 'none';
            }
            
            document.getElementById('productPrice').innerText = displayPrice;
            document.getElementById('productImage').src = foundProduct.img || 'https://via.placeholder.com/300/fff1ee/ee8587?text=Rose';
            document.getElementById('productDesc').innerText = foundProduct.desc || "A high-quality skincare product carefully formulated to nourish and protect your skin.";
        } else {
            document.getElementById('productTitle').innerText = "Product Not Found";
            document.getElementById('productImage').src = "https://via.placeholder.com/300/fff1ee/ee8587?text=Not+Found";
            document.getElementById('productDesc').innerText = "Sorry, this product could not be found.";
        }

        // ============================================================
        // نظام التقييم والتعليقات
        // ============================================================
        let currentRating = 0;
        let allReviews = JSON.parse(localStorage.getItem('productReviews')) || {};

        function renderComments() {
            const container = document.getElementById('commentsContainer');
            container.innerHTML = '';

            const productReviews = allReviews[productName] || [];

            if (productReviews.length === 0) {
                container.innerHTML = `<p class="no-comments" id="noReviewsText">${translations[currentLang].noReviews}</p>`;
                document.getElementById('ratingCount').innerText = '0';
                return;
            }

            let totalStars = 0;
            productReviews.forEach(r => totalStars += r.rating);
            const avgRating = (totalStars / productReviews.length).toFixed(1);
            document.getElementById('ratingCount').innerText = avgRating;

            productReviews.forEach(rev => {
                const starsHtml = '<i class="fas fa-star" style="color:#FFB300; font-size:12px;"></i>'.repeat(rev.rating);
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `
                    <div class="comment-header">
                        <span><i class="fas fa-user-circle" style="color:var(--rose);"></i> ${rev.name}</span>
                        <span class="comment-stars">${starsHtml}</span>
                    </div>
                    <p>${rev.text}</p>
                `;
                container.appendChild(div);
            });
        }

        function addReview() {
            const name = document.getElementById('userName').value.trim();
            const text = document.getElementById('userComment').value.trim();

            if (!name || !text) {
                alert(translations[currentLang].fillError);
                return;
            }
            if (currentRating === 0) {
                alert(translations[currentLang].rateError);
                return;
            }

            const newReview = { name: name, rating: currentRating, text: text };

            if (!allReviews[productName]) {
                allReviews[productName] = [];
            }
            allReviews[productName].unshift(newReview);

            localStorage.setItem('productReviews', JSON.stringify(allReviews));

            renderComments();
            document.getElementById('userName').value = '';
            document.getElementById('userComment').value = '';
            currentRating = 0;
            highlightStars(0);
            
            alert(translations[currentLang].successMsg);
        }

        // ============================================================
        // تفعيل نجوم التقييم
        // ============================================================
        const stars = document.querySelectorAll('.stars-container i');
        stars.forEach(star => {
            star.addEventListener('click', function() {
                const rating = parseInt(this.dataset.star);
                setRating(rating);
            });
            star.addEventListener('mouseenter', function() {
                const rating = parseInt(this.dataset.star);
                highlightStars(rating);
            });
            star.addEventListener('mouseleave', function() {
                highlightStars(currentRating);
            });
        });

        function setRating(rating) {
            currentRating = rating;
            highlightStars(rating);
        }

        function highlightStars(rating) {
            stars.forEach(star => {
                const starNum = parseInt(star.dataset.star);
                if (starNum <= rating) {
                    star.className = 'fas fa-star active';
                } else {
                    star.className = 'far fa-star';
                }
            });
        }

        // ============================================================
        // نظام الترجمة
        // ============================================================
        const translations = {
            en: {
                back: "Back to Products",
                add: "Add to Cart",
                reviews: "Reviews",
                title: "Customer Reviews",
                addTitle: "Add a Review",
                submit: "Submit Review",
                noReviews: "No reviews yet. Be the first to review!",
                fillError: "Please fill in your name and comment.",
                rateError: "Please rate the product by clicking the stars above.",
                successMsg: "Review added successfully!",
                qty: "Quantity:",
                langBtn: "🌐"
            },
            ar: {
                back: "عودة للمنتجات",
                add: "أضف إلى السلة",
                reviews: "تقييمات",
                title: "آراء العملاء",
                addTitle: "أضف تقييماً",
                submit: "إرسال التقييم",
                noReviews: "لا توجد تقييمات بعد. كن أول من يقيم!",
                fillError: "يرجى ملء اسمك والتعليق.",
                rateError: "يرجى تقييم المنتج بالضغط على النجوم أعلاه.",
                successMsg: "تم إضافة التقييم بنجاح!",
                qty: "الكمية:",
                langBtn: "🌐"
            }
        };

        let currentLang = 'en';

        window.onload = function() {
            const savedLang = localStorage.getItem('lang');
            if (savedLang === 'ar' || savedLang === 'en') {
                currentLang = savedLang;
                applyLanguage();
            }
            renderComments();
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').innerHTML = '☀️';
            }
        };

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            applyLanguage();
            localStorage.setItem('lang', currentLang);
        }

        function applyLanguage() {
            const t = translations[currentLang];
            document.getElementById('backText').innerText = t.back;
            document.getElementById('addText').innerText = t.add;
            document.getElementById('reviewsLabel').innerText = t.reviews;
            document.getElementById('reviewsTitle').innerText = t.title;
            document.getElementById('addReviewTitle').innerHTML = `<i class="fas fa-pen"></i> ${t.addTitle}`;
            document.getElementById('submitBtn').innerHTML = `<i class="fas fa-paper-plane"></i> ${t.submit}`;
            document.getElementById('qtyLabel').innerText = t.qty;
            document.getElementById('langBtn').innerText = t.langBtn;
            renderComments();
        }

        // ============================================================
        // الدارك مود
        // ============================================================
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('themeBtn');
            if (document.body.classList.contains('dark-mode')) {
                btn.innerHTML = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                btn.innerHTML = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        // ============================================================
        // إضافة المنتج إلى السلة
        // ============================================================
        function handleAddToCart() {
            const productName = document.getElementById('productTitle').innerText;
            const qty = parseInt(document.getElementById('qty').value) || 1;
            
            // استخراج السعر من النص
            let priceText = document.getElementById('productPrice').innerText;
            let price = parseFloat(priceText.replace(' ₪', '').replace(' JD', ''));
            if (isNaN(price)) price = 0;
            
            const img = document.getElementById('productImage').src;

            // التحقق من تسجيل الدخول
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            if (!isLoggedIn) {
                localStorage.setItem('redirectAfterLogin', window.location.href);
                alert(currentLang === 'ar' 
                    ? '⚠️ يرجى تسجيل الدخول أولاً لإضافة المنتجات إلى السلة.' 
                    : '⚠️ Please login first to add products to cart.');
                window.location.href = 'login.html';
                return;
            }

            // قراءة السلة الحالية
            let cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];

            // التحقق مما إذا كان المنتج موجوداً بالفعل في السلة
            const existingItemIndex = cart.findIndex(item => item.name === productName);

            if (existingItemIndex !== -1) {
                cart[existingItemIndex].qty += qty;
            } else {
                const newItem = {
                    id: Date.now(),
                    name: productName,
                    img: img,
                    price: price,
                    qty: qty
                };
                cart.push(newItem);
            }

            localStorage.setItem('shoppingCart', JSON.stringify(cart));

            // إشعار جميل
            const btn = document.querySelector('.btn-cart');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Added!';
            btn.style.background = '#4caf50';
            btn.style.transform = 'scale(0.98)';
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '';
                btn.style.transform = '';
            }, 1500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard - Rose Skincare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ===== متغيرات الورد ===== */
        :root {
            --rose: #ee8587;
            --rose-dark: #c96c6f;
            --rose-light: #fff1ee;
            --brown: #4b2d29;
            --cream: #fffaf7;
            --white: #ffffff;
            --text: #322725;
            --muted: #746764;
            --border: #f3dfda;
            --shadow: 0 18px 40px rgba(153, 84, 77, 0.14);

            /* مشتقات إضافية */
            --bg-color: var(--cream);
            --card-bg: var(--white);
            --text-color: var(--text);
            --primary: var(--rose);
            --primary-dark: var(--rose-dark);
            --primary-light: var(--rose-light);
            --border-color: var(--border);
        }

        /* ===== الوضع الليلي ===== */
        body.dark-mode {
            --bg-color: #1f1418;
            --card-bg: #2d1e22;
            --text-color: #f5e2e0;
            --border-color: #5a3d3a;
            --shadow: 0 18px 40px rgba(0,0,0,0.3);
            --primary: #f09a9c;
            --primary-dark: #d68083;
        }

        /* ===== إعادة ضبط ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
            display: flex;
            min-height: 100vh;
        }

        /* ===== السايدبار ===== */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            height: 100vh;
            position: fixed;
            padding: 30px 20px;
            box-shadow: 2px 0 12px rgba(0,0,0,0.04);
            border-right: 1px solid var(--border-color);
            transition: background 0.3s, border-color 0.3s;
            overflow-y: auto;
        }

        .sidebar .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--brown);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            letter-spacing: -0.3px;
        }

        .sidebar .logo i {
            color: var(--rose);
            font-size: 28px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar ul li {
            margin-bottom: 8px;
        }

        .sidebar ul li a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .sidebar ul li a i {
            width: 20px;
            text-align: center;
            font-size: 16px;
            color: var(--muted);
            transition: color 0.25s;
        }

        .sidebar ul li a:hover {
            background: var(--rose-light);
            color: var(--rose-dark);
            border-color: var(--border);
        }

        .sidebar ul li a:hover i {
            color: var(--rose-dark);
        }

        .sidebar ul li a.active {
            background: var(--rose-light);
            color: var(--rose-dark);
            border-color: var(--rose);
            font-weight: 600;
        }

        .sidebar ul li a.active i {
            color: var(--rose-dark);
        }

        .sidebar .logout {
            margin-top: 50px;
            color: #b34a4a !important;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .sidebar .logout i {
            color: #b34a4a !important;
        }

        .sidebar .logout:hover {
            background: #fce8e6 !important;
            color: #a33c3c !important;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 30px 36px;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .main-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--brown);
            letter-spacing: -0.2px;
        }

        .main-header h1 i {
            color: var(--rose);
            margin-right: 10px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-actions button {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 13px;
            color: var(--text-color);
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }

        .header-actions button i {
            color: var(--rose);
        }

        .header-actions button:hover {
            background: var(--rose-light);
            border-color: var(--rose);
        }

        /* ===== بطاقات الإحصائيات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px;
            margin-bottom: 34px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px 20px 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.25s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 22px 48px rgba(153, 84, 77, 0.18);
        }

        .stat-card .icon {
            font-size: 28px;
            color: var(--rose);
            margin-bottom: 8px;
        }

        .stat-card h3 {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.4px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--brown);
            letter-spacing: -0.3px;
        }

        .stat-card .value small {
            font-size: 14px;
            font-weight: 400;
            color: var(--muted);
        }

        /* ===== المخططات ===== */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .chart-box {
            background: var(--card-bg);
            padding: 22px 24px 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: box-shadow 0.25s;
            height: 320px;
            display: flex;
            flex-direction: column;
        }

        .chart-box:hover {
            box-shadow: 0 22px 48px rgba(153, 84, 77, 0.12);
        }

        .chart-box h4 {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--brown);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-box h4 i {
            color: var(--rose);
        }

        .chart-box canvas {
            flex: 1;
            max-height: 240px;
        }

        /* ===== استجابة ===== */
        @media (max-width: 992px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 16px 20px;
            }
            .sidebar .logo {
                margin-bottom: 18px;
            }
            .sidebar ul {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
            }
            .sidebar ul li {
                margin-bottom: 0;
            }
            .sidebar ul li a {
                padding: 8px 14px;
                font-size: 13px;
            }
            .sidebar .logout {
                margin-top: 0;
                border-top: none;
                padding-top: 0;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .main-header h1 {
                font-size: 22px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }
            .stat-card .value {
                font-size: 22px;
            }
            .chart-box {
                height: 280px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .header-actions button {
                padding: 6px 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== سايدبار ===== -->
    <aside class="sidebar">
        <a href="#" class="logo">
            <i class="fas fa-leaf"></i> Rose Admin
        </a>
        <ul>
            <li><a href="admin-dashboard.html" class="active"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="admin-products.html"><i class="fas fa-box"></i> Products</a></li>
            <li><a href="admin-orders.html"><i class="fas fa-shopping-bag"></i> Orders</a></li>
            <li><a href="admin-login.html" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>

    <!-- ===== المحتوى ===== -->
    <main class="main-content">
        <header class="main-header">
            <h1><i class="fas fa-chart-pie"></i> Dashboard</h1>
            <div class="header-actions">
                <button id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button id="darkToggle"><i class="fas fa-moon"></i> Dark</button>
            </div>
        </header>

        <!-- ===== الإحصائيات ===== -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="icon"><i class="fas fa-coins"></i></div>
                <h3>Total Revenue</h3>
                <div class="value" id="statRevenue">0 <small>₪</small></div>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fas fa-shopping-cart"></i></div>
                <h3>Total Orders</h3>
                <div class="value" id="statOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fas fa-cube"></i></div>
                <h3>Total Products</h3>
                <div class="value" id="statProducts">0</div>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fas fa-users"></i></div>
                <h3>Total Customers</h3>
                <div class="value" id="statCustomers">0</div>
            </div>
        </div>

        <!-- ===== المخططات ===== -->
        <div class="charts-grid">
            <div class="chart-box">
                <h4><i class="fas fa-chart-line"></i> Sales Trend</h4>
                <canvas id="lineChart"></canvas>
            </div>
            <div class="chart-box">
                <h4><i class="fas fa-chart-pie"></i> Category Distribution</h4>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // ===== دالة تحديث البيانات =====
        function updateDashboard() {
            const products = JSON.parse(localStorage.getItem('adminProducts')) || [];
            const orders = JSON.parse(localStorage.getItem('adminOrders')) || [];

            document.getElementById('statProducts').innerHTML = products.length;
            document.getElementById('statOrders').innerHTML = orders.length;

            let revenue = 0;
            orders.forEach(o => {
                let totalStr = o.total || '';
                // تنظيف النص من الرموز والحصول على الرقم
                let num = parseFloat(totalStr.replace(/[^0-9.]/g, ''));
                if (!isNaN(num)) revenue += num;
            });
            document.getElementById('statRevenue').innerHTML = revenue.toFixed(2) + ' <small>₪</small>';

            // محاكاة عدد العملاء
            const customerCount = Math.floor(Math.random() * 50) + 50;
            document.getElementById('statCustomers').innerHTML = customerCount;

            // ===== تحديث المخطط الخطي (بيانات عشوائية) =====
            if (window.lineChart) {
                window.lineChart.data.datasets[0].data = [
                    Math.floor(Math.random() * 120) + 20,
                    Math.floor(Math.random() * 160) + 30,
                    Math.floor(Math.random() * 200) + 40,
                    Math.floor(Math.random() * 250) + 50,
                    Math.floor(Math.random() * 300) + 40,
                    Math.floor(Math.random() * 350) + 30,
                    Math.floor(Math.random() * 400) + 20
                ];
                window.lineChart.update();
            }

            // ===== تحديث المخطط الدائري =====
            if (window.pieChart) {
                const cats = ['Cleanser', 'Toner', 'Moisturizer', 'Sunscreen', 'Perfume'];
                const counts = cats.map(c => products.filter(p => p.category === c).length);
                window.pieChart.data.datasets[0].data = counts;
                window.pieChart.update();
            }
        }

        // ===== تشغيل عند تحميل الصفحة =====
        window.addEventListener('DOMContentLoaded', function () {
            // ===== المخطط الخطي =====
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            window.lineChart = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Sales (₪)',
                        data: [45, 68, 92, 120, 155, 210, 280],
                        borderColor: '#ee8587',
                        backgroundColor: 'rgba(238, 133, 135, 0.12)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#ee8587',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // ===== المخطط الدائري =====
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            window.pieChart = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: ['Cleanser', 'Toner', 'Moisturizer', 'Sunscreen', 'Perfume'],
                    datasets: [{
                        data: [4, 3, 6, 2, 5],
                        backgroundColor: ['#ee8587', '#f5b3b5', '#fad1d0', '#f7c2a1', '#c96c6f'],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { usePointStyle: true, padding: 16, font: { size: 12 } }
                        }
                    },
                    cutout: '55%'
                }
            });

            // ===== تحديث أولي =====
            updateDashboard();

            // ===== زر التحديث =====
            document.getElementById('refreshBtn').addEventListener('click', function () {
                updateDashboard();
                this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Refreshing...';
                setTimeout(() => {
                    this.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh';
                }, 700);
            });

            // ===== الوضع الليلي =====
            let dark = false;
            document.getElementById('darkToggle').addEventListener('click', function () {
                dark = !dark;
                document.body.classList.toggle('dark-mode', dark);
                this.innerHTML = dark ? '<i class="fas fa-sun"></i> Light' : '<i class="fas fa-moon"></i> Dark';
            });
        });
    </script>
</body>
</html>

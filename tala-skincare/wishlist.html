<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Rose Skincare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== متغيرات الورد ===== */
        :root {
            --rose: #ee8587;
            --rose-dark: #c96c6f;
            --rose-light: #fff1ee;
            --brown: #4b2d29;
            --cream: #fffaf7;
            --white: #ffffff;
            --text: #322725;
            --muted: #746764;
            --border: #f3dfda;
            --shadow: 0 18px 40px rgba(153, 84, 77, 0.14);
            
            --bg-color: var(--cream);
            --card-bg: var(--white);
            --text-color: var(--text);
            --primary: var(--rose);
            --primary-dark: var(--rose-dark);
            --primary-light: var(--rose-light);
            --border-color: var(--border);
            --img-bg: var(--rose-light);
        }

        /* ===== الوضع الليلي ===== */
        body.dark-mode {
            --bg-color: #1f1418;
            --card-bg: #2d1e22;
            --text-color: #f5e2e0;
            --border-color: #5a3d3a;
            --shadow: 0 18px 40px rgba(0,0,0,0.3);
            --primary: #f09a9c;
            --primary-dark: #d68083;
            --img-bg: #3a2430;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        /* ===== الهيدر ===== */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            transition: background 0.3s, border-color 0.3s;
            flex-wrap: wrap;
            gap: 12px;
        }

        .top-header .logo {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--brown);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .top-header .logo i {
            color: var(--rose);
            font-size: 30px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-links {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .header-links a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .header-links a:hover {
            background: var(--rose-light);
            color: var(--rose-dark);
        }

        .header-links a i {
            margin-right: 4px;
        }

        .header-links a .fa-heart {
            color: var(--rose);
        }

        .header-links a .fa-shopping-cart {
            color: var(--rose-dark);
        }

        .header-actions .theme-btn,
        .header-actions .lang-switch-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-color);
            transition: all 0.3s;
        }

        .header-actions .theme-btn:hover,
        .header-actions .lang-switch-btn:hover {
            background: var(--rose-light);
            border-color: var(--rose);
        }

        /* ===== عنوان الصفحة ===== */
        .section-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            color: var(--brown);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .section-title i {
            color: var(--rose);
        }

        /* ===== شبكة المفضلة ===== */
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
        }

        /* ===== بطاقة المنتج ===== */
        .wishlist-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 22px 18px 18px;
            text-align: center;
            position: relative;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: all 0.35s ease;
        }

        .wishlist-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 22px 45px rgba(153, 84, 77, 0.18);
            border-color: var(--rose);
        }

        /* ===== صورة المنتج ===== */
        .wishlist-item .image-wrapper {
            width: 100%;
            height: 160px;
            border-radius: 14px;
            background: var(--img-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--border-color);
            transition: border-color 0.3s;
            margin-bottom: 12px;
        }

        .wishlist-item:hover .image-wrapper {
            border-color: var(--rose);
        }

        .wishlist-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
            transition: transform 0.3s;
        }

        .wishlist-item:hover img {
            transform: scale(1.05);
        }

        /* ===== اسم المنتج ===== */
        .wishlist-item h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-color);
            margin: 6px 0 4px;
            line-height: 1.3;
        }

        /* ===== السعر ===== */
        .wishlist-item .price {
            color: var(--rose-dark);
            font-weight: 700;
            font-size: 19px;
        }

        /* ===== زر الإزالة ===== */
        .remove-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            color: #d32f2f;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .remove-btn:hover {
            transform: scale(1.15);
            background: #ffebee;
            border-color: #d32f2f;
        }

        body.dark-mode .remove-btn:hover {
            background: #3a1a1a;
            border-color: #e74c3c;
        }

        /* ===== زر عرض المنتج ===== */
        .btn-shop {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            background: var(--rose);
            color: white;
            padding: 8px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(238, 133, 135, 0.25);
        }

        .btn-shop:hover {
            background: var(--rose-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 108, 111, 0.35);
        }

        .btn-shop i {
            font-size: 13px;
        }

        /* ===== رسالة فارغة ===== */
        .empty-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-msg i {
            font-size: 56px;
            color: var(--border-color);
            margin-bottom: 16px;
            display: block;
        }

        .empty-msg h3 {
            font-size: 22px;
            color: var(--text-color);
            margin-bottom: 8px;
            font-family: 'Playfair Display', serif;
        }

        .empty-msg a {
            color: var(--rose);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }

        .empty-msg a:hover {
            color: var(--rose-dark);
            text-decoration: underline;
        }

        /* ===== استجابة ===== */
        @media (max-width: 768px) {
            .top-header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding: 15px 20px;
            }

            .header-actions {
                flex-direction: column;
                gap: 10px;
            }

            .header-links {
                justify-content: center;
            }

            .section-title {
                font-size: 24px;
            }

            .wishlist-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 16px;
            }
        }

        @media (max-width: 480px) {
            .top-header .logo {
                font-size: 22px;
            }

            .header-links a {
                font-size: 12px;
                padding: 4px 8px;
            }

            .wishlist-grid {
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }

            .wishlist-item {
                padding: 14px 12px 14px;
            }

            .wishlist-item .image-wrapper {
                height: 120px;
            }

            .wishlist-item h3 {
                font-size: 13px;
            }

            .wishlist-item .price {
                font-size: 16px;
            }

            .btn-shop {
                padding: 6px 16px;
                font-size: 12px;
            }

            .remove-btn {
                width: 28px;
                height: 28px;
                font-size: 13px;
                top: 8px;
                right: 8px;
            }
        }

        @media (max-width: 380px) {
            .wishlist-grid {
                grid-template-columns: 1fr;
                max-width: 280px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== الهيدر ===== -->
        <header class="top-header">
            <div class="logo">
                <i class="fas fa-leaf"></i> ROSE
            </div>
            <div class="header-actions">
                <div class="header-links">
                    <a href="index.html" id="linkHome"><i class="fas fa-home"></i> Home</a>
                    <a href="products.html" id="linkProducts"><i class="fas fa-box"></i> Products</a>
                    <a href="offers.html" id="linkOffers" style="color: var(--rose);"><i class="fas fa-tags"></i> Offers</a>
                    <a href="wishlist.html" id="linkWishlist"><i class="fas fa-heart"></i> Wishlist</a>
                    <a href="cart.html" id="linkCart"><i class="fas fa-shopping-cart"></i> Cart</a>
                    <a href="login.html" id="linkLogin"><i class="fas fa-user"></i> Login</a>
                </div>
                <button class="lang-switch-btn" onclick="toggleLang()" id="langBtn">🌐</button>
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
            </div>
        </header>

        <!-- ===== العنوان ===== -->
        <h2 class="section-title">
            <i class="fas fa-heart" style="color: var(--rose);"></i>
            <span id="wishlistTitle">My Wishlist</span>
        </h2>

        <!-- ===== شبكة المفضلة ===== -->
        <div class="wishlist-grid" id="wishlistGrid">
            <!-- سيتم تعبئة المنتجات هنا بواسطة الجافاسكربت -->
        </div>
    </div>

    <script>
        // ===== تحميل قائمة المفضلة =====
        function loadWishlist() {
            const grid = document.getElementById('wishlistGrid');
            grid.innerHTML = '';
            const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            
            if (wishlist.length === 0) {
                grid.innerHTML = `
                    <div class="empty-msg">
                        <i class="fas fa-heart"></i>
                        <h3>Your wishlist is empty</h3>
                        <p>Start adding your favorite products!</p>
                        <a href="products.html"><i class="fas fa-arrow-right"></i> Browse Products</a>
                    </div>
                `;
                return;
            }
            
            wishlist.forEach(item => {
                const card = document.createElement('div');
                card.className = 'wishlist-item';
                card.innerHTML = `
                    <button class="remove-btn" onclick="removeItem('${item.name}')">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="image-wrapper">
                        <img src="${item.img || 'https://via.placeholder.com/200/fff1ee/ee8587?text=Rose'}" alt="${item.name}" loading="lazy">
                    </div>
                    <h3>${item.name}</h3>
                    <div class="price">${item.price}</div>
                    <a href="product-details.html?product=${encodeURIComponent(item.name)}" class="btn-shop">
                        <i class="fas fa-eye"></i> View Product
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        // ===== إزالة منتج من المفضلة =====
        function removeItem(name) {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            wishlist = wishlist.filter(item => item.name !== name);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            loadWishlist();
        }

        // ===== الدارك مود =====
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('themeBtn');
            if (document.body.classList.contains('dark-mode')) {
                btn.innerHTML = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                btn.innerHTML = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        // ===== الترجمة =====
        const translations = {
            en: {
                home: "Home", products: "Products", offers: "Offers", wishlist: "Wishlist",
                cart: "Cart", login: "Login", title: "My Wishlist",
                emptyTitle: "Your wishlist is empty",
                emptyText: "Start adding your favorite products!",
                browse: "Browse Products"
            },
            ar: {
                home: "الرئيسية", products: "المنتجات", offers: "خصومات", wishlist: "المفضلة",
                cart: "السلة", login: "دخول", title: "قائمة المفضلات",
                emptyTitle: "قائمة المفضلات فارغة",
                emptyText: "ابدأ بإضافة منتجاتك المفضلة!",
                browse: "تصفح المنتجات"
            }
        };
        let currentLang = 'en';

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            const t = translations[currentLang];
            
            document.getElementById('linkHome').innerHTML = `<i class="fas fa-home"></i> ${t.home}`;
            document.getElementById('linkProducts').innerHTML = `<i class="fas fa-box"></i> ${t.products}`;
            document.getElementById('linkOffers').innerHTML = `<i class="fas fa-tags"></i> ${t.offers}`;
            document.getElementById('linkWishlist').innerHTML = `<i class="fas fa-heart"></i> ${t.wishlist}`;
            document.getElementById('linkCart').innerHTML = `<i class="fas fa-shopping-cart"></i> ${t.cart}`;
            document.getElementById('linkLogin').innerHTML = `<i class="fas fa-user"></i> ${t.login}`;
            document.getElementById('wishlistTitle').innerText = t.title;
            
            // تحديث الرسالة الفارغة إذا كانت ظاهرة
            const emptyMsg = document.querySelector('.empty-msg');
            if (emptyMsg) {
                emptyMsg.querySelector('h3').innerText = t.emptyTitle;
                emptyMsg.querySelector('p').innerText = t.emptyText;
                emptyMsg.querySelector('a').innerHTML = `<i class="fas fa-arrow-right"></i> ${t.browse}`;
            }
        }

        // ===== التحميل الأولي =====
        window.onload = function() {
            loadWishlist();
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').innerHTML = '☀️';
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Rose Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #FFF5FA;      /* خلفية الصفحة */
            --white: #FFFFFF;         /* البطاقات الرئيسية */
            --text-color: #7A295A;    /* لون النص الأساسي */
            --dark-pink: #E754A6;     /* الأزرار والعناوين المهمة */
            --border-color: #F8B6D9;  /* الحدود */
            --shadow: 0 5px 15px rgba(231, 84, 166, 0.12);
        }
        body.dark-mode {
            --bg-color: #1A1018; --white: #2A1A22; --text-color: #F5E2EB; --dark-pink: #E85FAD; --border-color: #6A3A50;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); transition: 0.3s; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--white); height: 100vh; position: fixed; padding: 30px; box-shadow: 2px 0 10px rgba(0,0,0,0.03); }
        .sidebar .logo { font-family: 'Playfair Display'; font-size: 22px; font-weight: 700; color: #b25b60; margin-bottom: 40px; display: block; }
        .sidebar ul { list-style: none; }
        .sidebar ul li { margin-bottom: 10px; }
        .sidebar ul li a { display: flex; align-items: center; gap: 15px; padding: 12px 15px; color: var(--text-color); text-decoration: none; border-radius: 10px; font-weight: 500; transition: 0.3s; }
        .sidebar ul li a:hover, .sidebar ul li a.active { background: var(--card-bg); color: var(--dark-pink); }
        .sidebar .logout { margin-top: 50px; color: #e74c3c !important; }
        
        .main-content { margin-left: 260px; flex: 1; padding: 30px; }
        .header-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-title h1 { font-family: 'Playfair Display'; color: var(--text-color); }
        
        table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); }
        th { background: var(--card-bg); color: var(--text-color); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); color: var(--text-color); }
        
        .status-badge { padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .status-badge.paid { background: #d4edda; color: #155724; }
        .status-badge.pending { background: #fff3cd; color: #856404; }
        .status-badge.shipped { background: #cce5ff; color: #004085; }
        
        .action-btn { border: none; background: transparent; cursor: pointer; font-size: 16px; transition: 0.3s; margin: 0 5px; }
        .action-btn.view { color: #2196F3; }
        .action-btn.view:hover { background: #e3f2fd; border-radius: 5px; }
        .action-btn.delete { color: #f44336; }
        .action-btn.delete:hover { background: #ffebee; border-radius: 5px; }
        
        /* نافذة التفاصيل */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--white); padding: 30px; border-radius: 20px; width: 500px; max-width: 90%; box-shadow: var(--shadow); }
        .modal-content h2 { color: var(--text-color); margin-bottom: 20px; }
        .modal-content p { color: var(--text-color); margin: 10px 0; }
        .modal-content .btn-close { background: #999; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <a href="#" class="logo"><i class="fas fa-leaf"></i> Rose Admin</a>
        <ul>
            <li><a href="admin-dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="admin-products.html"><i class="fas fa-box"></i> Products</a></li>
            <li><a href="admin-orders.html" class="active"><i class="fas fa-shopping-bag"></i> Orders</a></li>
            <li><a href="admin-login.html" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="header-title">
            <h1>Manage Orders</h1>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <!-- سيتم تعبئة الطلبات هنا -->
            </tbody>
        </table>
    </main>

    <!-- نافذة عرض التفاصيل -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal-content">
            <h2>Order Details</h2>
            <p><strong>ID:</strong> <span id="detailId"></span></p>
            <p><strong>Customer:</strong> <span id="detailCustomer"></span></p>
            <p><strong>Total:</strong> <span id="detailTotal"></span></p>
            <p><strong>Status:</strong> <span id="detailStatus"></span></p>
            <button class="btn-close" onclick="closeOrderModal()">Close</button>
        </div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('adminOrders')) || [
            { id: "#1045", customer: "Sarah M.", total: "27.00 JD", status: "paid" },
            { id: "#1044", customer: "John D.", total: "18.50 JD", status: "pending" },
            { id: "#1043", customer: "Layla K.", total: "35.00 JD", status: "shipped" }
        ];

        function renderOrders() {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '';
            orders.forEach((o, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${o.id}</td>
                    <td>${o.customer}</td>
                    <td>${o.total}</td>
                    <td><span class="status-badge ${o.status}">${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span></td>
                    <td>
                        <button class="action-btn view" onclick="viewOrder(${index})"><i class="fas fa-eye"></i></button>
                        <button class="action-btn delete" onclick="deleteOrder(${index})"><i class="fas fa-trash-alt"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function viewOrder(index) {
            const o = orders[index];
            document.getElementById('detailId').innerText = o.id;
            document.getElementById('detailCustomer').innerText = o.customer;
            document.getElementById('detailTotal').innerText = o.total;
            document.getElementById('detailStatus').innerText = o.status.charAt(0).toUpperCase() + o.status.slice(1);
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeOrderModal() { document.getElementById('orderModal').style.display = 'none'; }

        function deleteOrder(index) {
            if (!confirm("Are you sure you want to delete this order?")) return;
            orders.splice(index, 1);
            localStorage.setItem('adminOrders', JSON.stringify(orders));
            renderOrders();
        }

        renderOrders();
    </script>
</body>
</html>

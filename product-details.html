<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Rose Skincare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --dark-pink: #d6858a; --text-color: #5a4c4c; --white: #ffffff; --bg-color: #fffafb; --star-active: #ffaa00; --star-inactive: #ddd; --card-bg: #fdf5f6; --rev-bg: #f9f9f9; --border: #e0d0d0; --discount-red: #e74c3c; }
        body.dark-mode { --text-color: #e0e0e0; --white: #2c2c2c; --bg-color: #1a1a1a; --star-inactive: #555; --card-bg: #3a3a3a; --rev-bg: #333; --border: #555; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); transition: 0.3s; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 1100px; width: 100%; background: var(--white); border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .lang-header { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 10px; }
        .lang-switch-btn, .theme-btn { background: var(--white); border: 1px solid var(--border); padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: 500; font-size: 14px; transition: 0.3s; color: var(--text-color); }
        .lang-switch-btn:hover, .theme-btn:hover { border-color: var(--dark-pink); }

        .product-layout { display: flex; gap: 50px; flex-wrap: wrap; }
        .img-box { flex: 1; min-width: 300px; background: var(--card-bg); border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 30px; }
        .img-box img { max-width: 100%; mix-blend-mode: multiply; }
        .details { flex: 1; min-width: 300px; }
        .details h1 { color: var(--text-color); font-size: 32px; margin-bottom: 5px; }
        .price-section { display: flex; align-items: center; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
        .details .price { color: var(--dark-pink); font-size: 24px; font-weight: 600; }
        .details .old-price { color: #999; text-decoration: line-through; font-size: 18px; }
        .discount-tag { background: var(--discount-red); color: white; padding: 2px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; }
        .details .desc { color: #888; line-height: 1.6; margin-bottom: 20px; }
        
        .rating-section { margin: 15px 0 25px 0; }
        .star-container { display: flex; gap: 5px; cursor: pointer; }
        .star-container i { font-size: 24px; color: var(--star-inactive); transition: 0.2s; }
        .star-container i.active { color: var(--star-active); }
        .rating-text { display: block; margin-top: 5px; font-size: 13px; color: #888; }
        
        .qty-box { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .qty-box button { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--border); background: var(--white); color: var(--text-color); cursor: pointer; }
        .qty-box input { width: 50px; text-align: center; border: none; font-size: 16px; color: var(--text-color); background: transparent; }
        .btn-add { background: var(--dark-pink); color: white; border: none; padding: 15px 40px; border-radius: 30px; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.3s; text-decoration: none; display: inline-block; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #888; text-decoration: none; font-size: 14px; }
        
        .related-section { margin-top: 50px; border-top: 1px solid var(--border); padding-top: 30px; }
        .related-section h2 { font-family: 'Playfair Display', serif; color: var(--text-color); margin-bottom: 20px; font-size: 24px; }
        .related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .related-card { background: var(--card-bg); border-radius: 15px; padding: 15px; text-align: center; transition: 0.3s; text-decoration: none; color: inherit; }
        .related-card:hover { transform: translateY(-5px); }
        .related-card img { width: 100%; height: 120px; object-fit: contain; mix-blend-mode: multiply; margin-bottom: 10px; }
        .related-card h4 { font-size: 14px; color: var(--text-color); margin-bottom: 5px; }
        .related-card span { color: var(--dark-pink); font-weight: 600; font-size: 13px; }

        .reviews-section { margin-top: 50px; border-top: 1px solid var(--border); padding-top: 30px; }
        .reviews-section h2 { font-family: 'Playfair Display', serif; color: var(--text-color); margin-bottom: 20px; font-size: 24px; }
        .review-item { background: var(--rev-bg); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .review-item .rev-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; font-weight: 500; color: var(--text-color); }
        .review-item .rev-stars { color: var(--star-active); font-size: 13px; }
        .review-item p { color: #888; font-size: 14px; line-height: 1.5; }

        .add-review-box { margin-top: 25px; background: var(--card-bg); padding: 20px; border-radius: 15px; }
        .add-review-box h4 { color: var(--text-color); margin-bottom: 10px; }
        .add-review-box input, .add-review-box textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 10px; outline: none; margin-bottom: 10px; font-family: inherit; background: var(--white); color: var(--text-color); }
        .add-review-box textarea { height: 80px; resize: vertical; }
        .add-review-box button { background: var(--dark-pink); color: white; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: 500; transition: 0.3s; }
        
        @media (max-width: 768px) { .container { padding: 20px; } .related-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-header">
            <button class="lang-switch-btn" onclick="toggleLang()" id="langBtn">🌐</button>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>
        
        <div class="product-layout">
            <div class="img-box">
                <img id="detailImage" src="" alt="Product Image">
            </div>
            <div class="details">
                <a href="products.html" class="back-link" id="backLink"><i class="fas fa-arrow-left"></i> <span id="backText">Back to Products</span></a>
                <h1 id="detailTitle">Loading...</h1>
                
                <div class="price-section">
                    <span class="price" id="detailPrice">0.00 JD</span>
                    <span class="old-price" id="oldPrice" style="display:none;"></span>
                    <span class="discount-tag" id="discountTag" style="display:none;">-0%</span>
                </div>
                
                <p class="desc" id="detailDesc">Loading description...</p>
                
                <div class="rating-section">
                    <div class="star-container" id="starContainer">
                        <i class="far fa-star" data-star="1"></i><i class="far fa-star" data-star="2"></i><i class="far fa-star" data-star="3"></i><i class="far fa-star" data-star="4"></i><i class="far fa-star" data-star="5"></i>
                    </div>
                    <span class="rating-text" id="ratingText"><strong id="ratingCount">0</strong> <span id="reviewsLabel">Reviews</span></span>
                </div>

                <div class="qty-box">
                    <button onclick="document.getElementById('qty').stepDown()">-</button>
                    <input type="number" id="qty" value="1" min="1">
                    <button onclick="document.getElementById('qty').stepUp()">+</button>
                </div>
                <a href="cart.html" class="btn-add" id="addBtn"><i class="fas fa-shopping-cart"></i> <span id="addText">Add to Cart</span></a>
            </div>
        </div>

        <div class="related-section">
            <h2 id="relatedTitle">Related Products</h2>
            <div class="related-grid" id="relatedGrid"></div>
        </div>

        <div class="reviews-section">
            <h2 id="reviewsTitle">Customer Reviews</h2>
            <div id="reviewsContainer"></div>
            <div class="add-review-box">
                <h4 id="addReviewTitle">Add a Review</h4>
                <input type="text" id="reviewName" placeholder="Your Name" required>
                <textarea id="reviewText" placeholder="Write your comment here..."></textarea>
                <button onclick="addNewReview()" id="submitReviewBtn">Submit Review</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // قاعدة البيانات
        // ============================================================
        const productsDatabase = {
            "Gentle Foaming Cleanser": { category: "cleanser", image: "https://images.unsplash.com/photo-1556228578-0d85b1a4d571?w=500&auto=format&fit=crop", price: 5.00, desc_en: "A gentle, foaming cleanser.", desc_ar: "غسول رغوي لطيف.", reviews: [{name: "Sara", rating: 5, text: "Best cleanser!"}] },
            "Rose Water Gel Wash": { category: "cleanser", image: "https://images.unsplash.com/photo-1608248597279-f99d160bfbc8?w=500&auto=format&fit=crop", price: 6.50, desc_en: "Infused with real rose water.", desc_ar: "مملوء بماء الورد الحقيقي.", reviews: [{name: "Layla", rating: 5, text: "Smells heavenly."}] },
            "Rose Petal Balancing Toner": { category: "toner", image: "https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=500&auto=format&fit=crop", price: 6.00, desc_en: "Restore your skin's pH balance.", desc_ar: "استعد توازن بشرتك.", reviews: [{name: "Noor", rating: 5, text: "My pores are less visible."}] },
            "Daily Hydrating Lotion": { category: "moisturizer", image: "https://images.unsplash.com/photo-1556228578-0d85b1a4d571?w=500&auto=format&fit=crop", price: 9.50, desc_en: "A lightweight, daily moisturizer.", desc_ar: "مرطب يومي خفيف الوزن.", reviews: [{name: "Maya", rating: 5, text: "Love it!"}] },
            "Night Repair Cream": { category: "moisturizer", image: "https://images.unsplash.com/photo-1629198688000-71f23e745b6e?w=500&auto=format&fit=crop", price: 11.50, desc_en: "Rich night cream.", desc_ar: "كريم ليلي غني.", reviews: [{name: "Omar", rating: 4, text: "Great cream."}] },
            "SPF 50 Daily Defense": { category: "sunscreen", image: "https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=500&auto=format&fit=crop", price: 11.00, desc_en: "Protect your skin.", desc_ar: "احم بشرتك.", reviews: [{name: "Huda", rating: 5, text: "Perfect!"}] },
            "Rose Bloom Eau de Parfum": { category: "perfume", image: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=500&auto=format&fit=crop", price: 18.00, desc_en: "A romantic and elegant fragrance.", desc_ar: "عطر رومانسي وأنيق.", reviews: [{name: "Sarah", rating: 5, text: "My signature scent!"}] }
        };

        const translations = {
            en: { back: "Back to Products", add: "Add to Cart", reviews: "Reviews", related: "Related Products", revTitle: "Customer Reviews", addTitle: "Add a Review", subBtn: "Submit Review", langBtn: "🌐" },
            ar: { back: "عودة للمنتجات", add: "أضف إلى السلة", reviews: "تقييمات", related: "منتجات مشابهة", revTitle: "آراء العملاء", addTitle: "أضف تقييماً", subBtn: "إرسال التقييم", langBtn: "🌐" }
        };
        
        let currentLang = 'en', currentRating = 0, currentProductName = "";

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            currentProductName = params.get('product');
            const discount = parseInt(params.get('discount')) || 0;

            if (currentProductName && productsDatabase[currentProductName]) {
                const data = productsDatabase[currentProductName];
                document.getElementById('detailTitle').innerText = currentProductName;
                
                // تطبيق الخصم
                let finalPrice = data.price;
                if (discount > 0) {
                    finalPrice = data.price - (data.price * (discount / 100));
                    document.getElementById('oldPrice').innerText = data.price.toFixed(2) + " JD";
                    document.getElementById('oldPrice').style.display = 'inline';
                    document.getElementById('discountTag').innerText = "-" + discount + "%";
                    document.getElementById('discountTag').style.display = 'inline';
                }
                
                document.getElementById('detailPrice').innerText = finalPrice.toFixed(2) + " JD";
                document.getElementById('detailImage').src = data.image;
                document.getElementById('detailDesc').innerText = data.desc_en;
                
                generateRelatedProducts(data.category);
                renderReviews(data.reviews);
            } else {
                document.getElementById('detailTitle').innerText = "Product Not Found";
            }

            const stars = document.querySelectorAll('.star-container i');
            stars.forEach(star => {
                star.addEventListener('click', function() { setRating(parseInt(this.dataset.star)); });
                star.addEventListener('mouseenter', function() { highlightStars(parseInt(this.dataset.star)); });
                star.addEventListener('mouseleave', function() { highlightStars(currentRating); });
            });

            if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('themeBtn').innerHTML = '☀️'; }
        };

        function setRating(r) { currentRating = r; highlightStars(r); document.getElementById('ratingCount').innerText = r; }
        function highlightStars(r) { document.querySelectorAll('.star-container i').forEach(s => parseInt(s.dataset.star) <= r ? s.className = 'fas fa-star active' : s.className = 'far fa-star'); }

        function generateRelatedProducts(c) {
            const grid = document.getElementById('relatedGrid'); grid.innerHTML = '';
            let count = 0;
            for (const [name, data] of Object.entries(productsDatabase)) {
                if (data.category === c && name !== currentProductName && count < 4) {
                    const card = document.createElement('a');
                    card.href = `product-details.html?product=${encodeURIComponent(name)}`;
                    card.className = 'related-card';
                    card.innerHTML = `<img src="${data.image}"><h4>${name}</h4><span>${data.price.toFixed(2)} JD</span>`;
                    grid.appendChild(card); count++;
                }
            }
            if (count === 0) grid.innerHTML = '<p style="color:#888;grid-column:1/-1;">No similar products found.</p>';
        }

        function renderReviews(reviews) {
            const container = document.getElementById('reviewsContainer'); container.innerHTML = '';
            if (!reviews || reviews.length === 0) { container.innerHTML = '<p style="color:#888;">No reviews yet.</p>'; return; }
            reviews.forEach(rev => {
                const starsHtml = '<i class="fas fa-star" style="color:#ffaa00;"></i>'.repeat(rev.rating);
                const div = document.createElement('div'); div.className = 'review-item';
                div.innerHTML = `<div class="rev-header"><span>${rev.name}</span><span class="rev-stars">${starsHtml}</span></div><p>${rev.text}</p>`;
                container.appendChild(div);
            });
        }

        function addNewReview() {
            const n = document.getElementById('reviewName').value.trim();
            const t = document.getElementById('reviewText').value.trim();
            if (!n || !t) { alert("Please fill in all fields."); return; }
            if (currentRating === 0) { alert("Please rate the product."); return; }
            const newReview = { name: n, rating: currentRating, text: t };
            if (productsDatabase[currentProductName]) {
                productsDatabase[currentProductName].reviews.unshift(newReview);
                renderReviews(productsDatabase[currentProductName].reviews);
                document.getElementById('reviewName').value = ''; document.getElementById('reviewText').value = '';
                alert("Review added!");
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            const t = translations[currentLang];
            document.getElementById('backText').innerText = t.back; document.getElementById('addText').innerText = t.add;
            document.getElementById('reviewsLabel').innerText = t.reviews; document.getElementById('relatedTitle').innerText = t.related;
            document.getElementById('reviewsTitle').innerText = t.revTitle; document.getElementById('addReviewTitle').innerText = t.addTitle;
            document.getElementById('submitReviewBtn').innerText = t.subBtn; document.getElementById('langBtn').innerText = t.langBtn;
            if (productsDatabase[currentProductName]) {
                document.getElementById('detailDesc').innerText = currentLang === 'en' ? productsDatabase[currentProductName].desc_en : productsDatabase[currentProductName].desc_ar;
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('themeBtn');
            if (document.body.classList.contains('dark-mode')) { btn.innerHTML = '☀️'; localStorage.setItem('theme', 'dark'); }
            else { btn.innerHTML = '🌙'; localStorage.setItem('theme', 'light'); }
        }
    </script>
</body>
</html>

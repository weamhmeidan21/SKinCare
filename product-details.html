<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Rose Skincare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            /* Light Mode */
            --bg-color: #FFF5FA; 
            --white: #FFFFFF; 
            --text-color: #7A295A; 
            --dark-pink: #E754A6; 
            --card-bg: #FFE4F1; 
            --border-color: #F8B6D9; 
            --shadow: 0 10px 30px rgba(231, 84, 166, 0.12); 
            --star-active: #FFB300; 
            --star-inactive: #ddd; 
            --input-bg: #FFFFFF;
            --img-shadow: 0 6px 20px rgba(231, 84, 166, 0.08);
            --discount-red: #e74c3c;
        }
        body.dark-mode {
            /* Dark Mode */
            --bg-color: #1A1018; 
            --white: #2A1A22; 
            --text-color: #F5E2EB; 
            --dark-pink: #E85FAD; 
            --card-bg: #3A2230; 
            --border-color: #6A3A50; 
            --shadow: 0 10px 30px rgba(255,255,255,0.05); 
            --star-inactive: #555; 
            --input-bg: #3A2230;
            --img-shadow: 0 6px 20px rgba(255,255,255,0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); transition: background 0.3s, color 0.3s; display: flex; justify-content: center; padding: 40px; }
        .container { max-width: 1000px; width: 100%; background: var(--white); border-radius: 20px; padding: 40px; box-shadow: var(--shadow); }
        
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .page-header .back-link { color: #888; text-decoration: none; transition: 0.3s; }
        .page-header .back-link:hover { color: var(--dark-pink); }
        .header-buttons { display: flex; gap: 10px; }
        .lang-btn, .theme-btn { background: var(--white); border: 1px solid var(--border-color); padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: 500; font-size: 14px; color: var(--text-color); transition: 0.3s; }
        .lang-btn:hover, .theme-btn:hover { border-color: var(--dark-pink); }

        .product-content { 
            display: flex; 
            gap: 40px; 
            flex-wrap: wrap; 
            align-items: flex-start;
        }
        
        /* ===== صورة المنتج ===== */
        .image-box { 
            flex: 1; 
            min-width: 320px; 
            max-width: 500px;
            background: var(--card-bg); 
            border-radius: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 40px 30px; 
            box-shadow: var(--img-shadow);
            margin: 0 auto;
        }
        .image-box img { 
            max-width: 100%; 
            max-height: 500px; 
            width: auto;
            height: auto;
            object-fit: contain; 
            border-radius: 8px;
        }
        
        /* ===== المعلومات ===== */
        .info-box { 
            flex: 1.2; 
            min-width: 300px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .info-box h1 { font-family: 'Playfair Display'; font-size: 34px; color: var(--text-color); margin-bottom: 10px; }
        
        .price-section { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            flex-wrap: wrap; 
            margin: 15px 0; 
        }
        .info-box .price { display: block; font-size: 28px; font-weight: bold; color: var(--dark-pink); }
        .info-box .old-price { 
            font-size: 20px; 
            color: #999; 
            text-decoration: line-through; 
        }
        .info-box .discount-tag { 
            background: var(--discount-red); 
            color: white; 
            padding: 2px 12px; 
            border-radius: 20px; 
            font-size: 14px; 
            font-weight: bold; 
        }
        
        .info-box .desc { color: #888; line-height: 1.8; margin-bottom: 25px; font-size: 15px; }
        
        .rating-section { margin: 20px 0; }
        .stars-container { display: flex; gap: 5px; cursor: pointer; }
        .stars-container i { font-size: 24px; color: var(--star-inactive); transition: 0.2s; }
        .stars-container i.active { color: var(--star-active); }
        .rating-info { display: block; margin-top: 5px; font-size: 14px; color: #888; }
        .rating-info strong { color: var(--text-color); }

        .qty-box { display: flex; align-items: center; gap: 15px; margin: 20px 0; }
        .qty-box label { font-weight: 500; color: var(--text-color); }
        .qty-box input { width: 60px; padding: 10px; text-align: center; border: 1px solid var(--border-color); border-radius: 10px; font-size: 16px; background: var(--input-bg); color: var(--text-color); outline: none; }
        .qty-box button { width: 40px; height: 40px; border: 1px solid var(--border-color); background: var(--white); border-radius: 50%; cursor: pointer; color: var(--text-color); transition: 0.3s; }
        .qty-box button:hover { background: var(--dark-pink); color: white; }
        
        .btn-cart { background: var(--dark-pink); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; width: 100%; }
        .btn-cart:hover { background: #C5408A; transform: translateY(-2px); }
        .btn-cart i { margin-right: 10px; }

        .comments-section { margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 25px; }
        .comments-section h3 { color: var(--text-color); margin-bottom: 15px; }
        .comment-item { background: var(--card-bg); padding: 12px 15px; border-radius: 10px; margin-bottom: 12px; }
        .comment-item .comment-header { display: flex; justify-content: space-between; font-size: 14px; font-weight: 500; color: var(--text-color); }
        .comment-item .comment-stars { color: var(--star-active); font-size: 12px; }
        .comment-item p { color: #666; font-size: 14px; margin-top: 5px; }
        .no-comments { color: #999; font-size: 14px; }
        
        .add-comment-box { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-top: 20px; }
        .add-comment-box h4 { color: var(--text-color); margin-bottom: 10px; }
        .add-comment-box input, .add-comment-box textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; margin-bottom: 10px; font-family: inherit; background: var(--input-bg); color: var(--text-color); }
        .add-comment-box textarea { height: 80px; resize: vertical; }
        .add-comment-box button { background: var(--dark-pink); color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: 500; transition: 0.3s; }
        .add-comment-box button:hover { background: #C5408A; }

        @media (max-width: 600px) { 
            .container { padding: 20px; } 
            .product-content { flex-direction: column; align-items: center; } 
            .image-box { min-width: 100%; padding: 20px; } 
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- رأس الصفحة -->
        <div class="page-header">
            <a href="products.html" class="back-link" id="backLink"><i class="fas fa-arrow-left"></i> <span id="backText">Back to Products</span></a>
            <div class="header-buttons">
                <button class="lang-btn" onclick="toggleLang()" id="langBtn">🌐</button>
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
            </div>
        </div>

        <div class="product-content">
            <!-- صورة المنتج -->
            <div class="image-box">
                <img id="productImage" src="" alt="Product Image">
            </div>
            
            <div class="info-box">
                <h1 id="productTitle">Loading...</h1>
                
                <!-- قسم السعر مع الخصم -->
                <div class="price-section">
                    <span class="price" id="productPrice">0.00 JD</span>
                    <span class="old-price" id="oldPrice" style="display:none;"></span>
                    <span class="discount-tag" id="discountTag" style="display:none;">-0%</span>
                </div>
                
                <p class="desc" id="productDesc">Loading description...</p>
                
                <div class="rating-section">
                    <div class="stars-container" id="starsContainer">
                        <i class="far fa-star" data-star="1"></i>
                        <i class="far fa-star" data-star="2"></i>
                        <i class="far fa-star" data-star="3"></i>
                        <i class="far fa-star" data-star="4"></i>
                        <i class="far fa-star" data-star="5"></i>
                    </div>
                    <span class="rating-info">
                        <strong id="ratingCount">0</strong> <span id="reviewsLabel">Reviews</span>
                    </span>
                </div>
                
                <div class="qty-box">
                    <label id="qtyLabel">Quantity:</label>
                    <button onclick="document.getElementById('qty').stepDown()">-</button>
                    <input type="number" id="qty" value="1" min="1">
                    <button onclick="document.getElementById('qty').stepUp()">+</button>
                </div>
                <button class="btn-cart" onclick="handleAddToCart()"><i class="fas fa-shopping-cart"></i> <span id="addText">Add to Cart</span></button>

                <!-- التعليقات -->
                <div class="comments-section">
                    <h3 id="reviewsTitle">Customer Reviews</h3>
                    <div id="commentsContainer">
                        <p class="no-comments" id="noReviewsText">No reviews yet. Be the first to review!</p>
                    </div>
                    
                    <div class="add-comment-box">
                        <h4 id="addReviewTitle">Add a Review</h4>
                        <input type="text" id="userName" placeholder="Your Name" required>
                        <textarea id="userComment" placeholder="Write your comment here..." required></textarea>
                        <button onclick="addReview()" id="submitBtn">Submit Review</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // تحميل بيانات المنتج من LocalStorage
        // ============================================================
        const products = JSON.parse(localStorage.getItem('adminProducts')) || [];
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('product');
        const foundProduct = products.find(p => p.name === productName);

        if (foundProduct) {
            document.getElementById('productTitle').innerText = foundProduct.name;
            
            // عرض السعر مع الخصم
            let displayPrice = foundProduct.price;
            let discountPercent = foundProduct.discount || 0;
            
            if (discountPercent > 0) {
                const originalPrice = parseFloat(foundProduct.price.replace(' JD', ''));
                const discountedPrice = originalPrice * (1 - discountPercent / 100);
                displayPrice = discountedPrice.toFixed(2) + ' JD';
                
                document.getElementById('oldPrice').innerText = foundProduct.price;
                document.getElementById('oldPrice').style.display = 'inline';
                document.getElementById('discountTag').innerText = `-${discountPercent}%`;
                document.getElementById('discountTag').style.display = 'inline';
            } else {
                document.getElementById('oldPrice').style.display = 'none';
                document.getElementById('discountTag').style.display = 'none';
            }
            
            document.getElementById('productPrice').innerText = displayPrice;
            document.getElementById('productImage').src = foundProduct.img;
            document.getElementById('productDesc').innerText = foundProduct.desc || "A high-quality skincare product carefully formulated to nourish and protect your skin.";
        } else {
            document.getElementById('productTitle').innerText = "Product Not Found";
            document.getElementById('productImage').src = "https://via.placeholder.com/300";
        }

        // ============================================================
        // نظام التقييم والتعليقات
        // ============================================================
        let currentRating = 0;
        let allReviews = JSON.parse(localStorage.getItem('productReviews')) || {};

        function renderComments() {
            const container = document.getElementById('commentsContainer');
            container.innerHTML = '';

            const productReviews = allReviews[productName] || [];

            if (productReviews.length === 0) {
                container.innerHTML = `<p class="no-comments" id="noReviewsText">${translations[currentLang].noReviews}</p>`;
                return;
            }

            let totalStars = 0;
            productReviews.forEach(r => totalStars += r.rating);
            const avgRating = (totalStars / productReviews.length).toFixed(1);
            document.getElementById('ratingCount').innerText = avgRating;

            productReviews.forEach(rev => {
                const starsHtml = '<i class="fas fa-star" style="color:#FFB300;"></i>'.repeat(rev.rating);
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `
                    <div class="comment-header">
                        <span>${rev.name}</span>
                        <span class="comment-stars">${starsHtml}</span>
                    </div>
                    <p>${rev.text}</p>
                `;
                container.appendChild(div);
            });
        }

        function addReview() {
            const name = document.getElementById('userName').value.trim();
            const text = document.getElementById('userComment').value.trim();

            if (!name || !text) {
                alert(translations[currentLang].fillError);
                return;
            }
            if (currentRating === 0) {
                alert(translations[currentLang].rateError);
                return;
            }

            const newReview = { name: name, rating: currentRating, text: text };

            if (!allReviews[productName]) {
                allReviews[productName] = [];
            }
            allReviews[productName].unshift(newReview);

            localStorage.setItem('productReviews', JSON.stringify(allReviews));

            renderComments();
            document.getElementById('userName').value = '';
            document.getElementById('userComment').value = '';
            
            alert(translations[currentLang].successMsg);
        }

        // ============================================================
        // تفعيل نجوم التقييم
        // ============================================================
        const stars = document.querySelectorAll('.stars-container i');
        stars.forEach(star => {
            star.addEventListener('click', function() {
                const rating = parseInt(this.dataset.star);
                setRating(rating);
            });
            star.addEventListener('mouseenter', function() {
                const rating = parseInt(this.dataset.star);
                highlightStars(rating);
            });
            star.addEventListener('mouseleave', function() {
                highlightStars(currentRating);
            });
        });

        function setRating(rating) {
            currentRating = rating;
            highlightStars(rating);
        }

        function highlightStars(rating) {
            stars.forEach(star => {
                const starNum = parseInt(star.dataset.star);
                if (starNum <= rating) {
                    star.className = 'fas fa-star active';
                } else {
                    star.className = 'far fa-star';
                }
            });
        }

        // ============================================================
        // نظام الترجمة
        // ============================================================
        const translations = {
            en: {
                back: "Back to Products",
                add: "Add to Cart",
                reviews: "Reviews",
                title: "Customer Reviews",
                addTitle: "Add a Review",
                submit: "Submit Review",
                noReviews: "No reviews yet. Be the first to review!",
                fillError: "Please fill in your name and comment.",
                rateError: "Please rate the product by clicking the stars above.",
                successMsg: "Review added successfully!",
                qty: "Quantity:",
                langBtn: "🌐"
            },
            ar: {
                back: "عودة للمنتجات",
                add: "أضف إلى السلة",
                reviews: "تقييمات",
                title: "آراء العملاء",
                addTitle: "أضف تقييماً",
                submit: "إرسال التقييم",
                noReviews: "لا توجد تقييمات بعد. كن أول من يقيم!",
                fillError: "يرجى ملء اسمك والتعليق.",
                rateError: "يرجى تقييم المنتج بالضغط على النجوم أعلاه.",
                successMsg: "تم إضافة التقييم بنجاح!",
                qty: "الكمية:",
                langBtn: "🌐"
            }
        };

        let currentLang = 'en';

        window.onload = function() {
            const savedLang = localStorage.getItem('lang');
            if (savedLang === 'ar' || savedLang === 'en') {
                currentLang = savedLang;
                applyLanguage();
            }
            renderComments();
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').innerHTML = '☀️';
            }
        };

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            applyLanguage();
            localStorage.setItem('lang', currentLang);
        }

        function applyLanguage() {
            const t = translations[currentLang];
            document.getElementById('backText').innerText = t.back;
            document.getElementById('addText').innerText = t.add;
            document.getElementById('reviewsLabel').innerText = t.reviews;
            document.getElementById('reviewsTitle').innerText = t.title;
            document.getElementById('addReviewTitle').innerText = t.addTitle;
            document.getElementById('submitBtn').innerText = t.submit;
            document.getElementById('qtyLabel').innerText = t.qty;
            document.getElementById('langBtn').innerText = t.langBtn;
            renderComments();
        }

        // ============================================================
        // الدارك مود
        // ============================================================
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('themeBtn');
            if (document.body.classList.contains('dark-mode')) {
                btn.innerHTML = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                btn.innerHTML = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        // ============================================================
        // ✅ إضافة المنتج إلى السلة
        // ============================================================
        function handleAddToCart() {
            const productName = document.getElementById('productTitle').innerText;
            const qty = parseInt(document.getElementById('qty').value) || 1;
            const priceText = document.getElementById('productPrice').innerText;
            const img = document.getElementById('productImage').src;

            // تحويل السعر من نص إلى رقم
            const price = parseFloat(priceText.replace(' JD', ''));

            // قراءة السلة الحالية
            let cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];

            // التحقق مما إذا كان المنتج موجوداً بالفعل في السلة
            const existingItemIndex = cart.findIndex(item => item.name === productName);

            if (existingItemIndex !== -1) {
                // إذا كان موجوداً، قم بزيادة الكمية
                cart[existingItemIndex].qty += qty;
            } else {
                // إذا لم يكن موجوداً، أضف منتجاً جديداً
                const newItem = {
                    id: Date.now(),
                    name: productName,
                    img: img,
                    price: price,
                    qty: qty
                };
                cart.push(newItem);
            }

            // حفظ السلة
            localStorage.setItem('shoppingCart', JSON.stringify(cart));

            alert(`Added ${qty} x "${productName}" to your cart!`);
            
            // اختياري: التوجه إلى السلة فوراً
            // window.location.href = 'cart.html';
        }
    </script>
</body>
</html>

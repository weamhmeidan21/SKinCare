<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Rose Skincare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #FFF5FA;      /* خلفية الصفحة */
            --white: #FFFFFF;         /* العناصر البيضاء */
            --text-color: #7A295A;    /* النصوص */
            --dark-pink: #E754A6;     /* الأزرار والعناوين */
            --border-color: #F6B8D8;  /* الحدود */
            --shadow: 0 10px 30px rgba(231, 84, 166, 0.12);
        }
        body.dark-mode {
            --bg-color: #1A1018; --white: #2A1A22; --text-color: #F5E2EB; --dark-pink: #E85FAD; --border-color: #6A3A50; --shadow: 0 10px 30px rgba(255,255,255,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); transition: 0.3s; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--white); height: 100vh; position: fixed; padding: 30px; box-shadow: 2px 0 10px rgba(0,0,0,0.03); }
        .sidebar .logo { font-family: 'Playfair Display'; font-size: 22px; font-weight: 700; color: #b25b60; margin-bottom: 40px; display: block; }
        .sidebar ul { list-style: none; }
        .sidebar ul li { margin-bottom: 10px; }
        .sidebar ul li a { display: flex; align-items: center; gap: 15px; padding: 12px 15px; color: var(--text-color); text-decoration: none; border-radius: 10px; font-weight: 500; transition: 0.3s; }
        .sidebar ul li a:hover, .sidebar ul li a.active { background: var(--card-bg); color: var(--dark-pink); }
        .sidebar .logout { margin-top: 50px; color: #e74c3c !important; }
        
        .main-content { margin-left: 260px; flex: 1; padding: 30px; }
        .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .main-header h1 { font-family: 'Playfair Display'; color: var(--text-color); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: var(--shadow); text-align: center; }
        .stat-card h3 { font-size: 13px; color: #888; margin-bottom: 10px; }
        .stat-card .value { font-size: 24px; font-weight: 700; color: var(--text-color); }
        
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: var(--shadow); height: 300px; }
        .chart-box h4 { color: var(--text-color); margin-bottom: 15px; }
        @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; } .main-content { margin-left: 0; } .charts-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <a href="#" class="logo"><i class="fas fa-leaf"></i> Rose Admin</a>
        <ul>
            <li><a href="admin-dashboard.html" class="active"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="admin-products.html"><i class="fas fa-box"></i> Products</a></li>
            <li><a href="admin-orders.html"><i class="fas fa-shopping-bag"></i> Orders</a></li>
            <li><a href="admin-login.html" class="logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <h1>Dashboard</h1>
        </header>
        
        <!-- الإحصائيات -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><h3>Total Revenue</h3><div class="value" id="statRevenue">0 JD</div></div>
            <div class="stat-card"><h3>Total Orders</h3><div class="value" id="statOrders">0</div></div>
            <div class="stat-card"><h3>Total Products</h3><div class="value" id="statProducts">0</div></div>
            <div class="stat-card"><h3>Total Customers</h3><div class="value" id="statCustomers">0</div></div>
        </div>

        <!-- الرسوم البيانية -->
        <div class="charts-grid">
            <div class="chart-box">
                <h4>Sales Trend</h4>
                <canvas id="lineChart"></canvas>
            </div>
            <div class="chart-box">
                <h4>Category Distribution</h4>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        function updateDashboard() {
            const products = JSON.parse(localStorage.getItem('adminProducts')) || [];
            const orders = JSON.parse(localStorage.getItem('adminOrders')) || [];

            document.getElementById('statProducts').innerText = products.length;
            document.getElementById('statOrders').innerText = orders.length;
            
            let revenue = 0;
            orders.forEach(o => {
                const num = parseFloat(o.total.replace(' JD', ''));
                if(!isNaN(num)) revenue += num;
            });
            document.getElementById('statRevenue').innerText = revenue.toFixed(2) + ' JD';
            document.getElementById('statCustomers').innerText = Math.floor(Math.random() * 50) + 50;

            // تحديث المخطط الخطي
            if(window.lineChart) {
                window.lineChart.data.datasets[0].data = [
                    Math.floor(Math.random() * 100),
                    Math.floor(Math.random() * 150),
                    Math.floor(Math.random() * 200),
                    Math.floor(Math.random() * 250),
                    Math.floor(Math.random() * 300),
                    Math.floor(Math.random() * 350),
                    Math.floor(Math.random() * 400)
                ];
                window.lineChart.update();
            }

            // تحديث المخطط الدائري
            if(window.pieChart) {
                window.pieChart.data.datasets[0].data = [
                    products.filter(p => p.category === 'Cleanser').length,
                    products.filter(p => p.category === 'Toner').length,
                    products.filter(p => p.category === 'Moisturizer').length,
                    products.filter(p => p.category === 'Sunscreen').length,
                    products.filter(p => p.category === 'Perfume').length
                ];
                window.pieChart.update();
            }
        }

        window.onload = function() {
            // رسم المخططات
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            window.lineChart = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Sales (JD)',
                        data: [0, 0, 0, 0, 0, 0, 0],
                        borderColor: '#E754A6',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(231, 84, 166, 0.1)'
                    }]
                }
            });

            const ctxPie = document.getElementById('pieChart').getContext('2d');
            window.pieChart = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: ['Cleanser', 'Toner', 'Moisturizer', 'Sunscreen', 'Perfume'],
                    datasets: [{
                        data: [0, 0, 0, 0, 0],
                        backgroundColor: ['#E754A6', '#F8B6D9', '#FFD6EA', '#FFB300', '#D63384']
                    }]
                }
            });

            updateDashboard();
        };
    </script>
</body>
</html>
